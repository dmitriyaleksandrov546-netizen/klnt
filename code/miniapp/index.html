<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BookBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       var(--tg-theme-bg-color, #1c1c1e);
      --bg2:      var(--tg-theme-secondary-bg-color, #2c2c2e);
      --text:     var(--tg-theme-text-color, #ffffff);
      --hint:     var(--tg-theme-hint-color, #8e8e93);
      --link:     var(--tg-theme-link-color, #4a9eff);
      --btn:      var(--tg-theme-button-color, #4a9eff);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --accent:   #4a9eff;
      --green:    #32d74b;
      --radius:   14px;
      --nav-h:    60px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ─────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .screen { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
    .screen.hidden { display: none; }

    /* ── Bottom nav ──────────────────────────── */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--bg2);
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px;
      background: none; border: none; color: var(--hint);
      font-size: 10px; font-weight: 500; letter-spacing: .3px;
      cursor: pointer; transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn svg { transition: transform .2s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active svg { transform: scale(1.1); }

    /* ── Section title ───────────────────────── */
    .section-title {
      font-size: 22px; font-weight: 700; letter-spacing: -.3px;
      margin-bottom: 16px;
    }

    /* ── Book card ───────────────────────────── */
    .book-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .book-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .book-meta { flex: 1; min-width: 0; }
    .book-title {
      font-size: 16px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .book-author { font-size: 13px; color: var(--hint); margin-top: 2px; }

    .book-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-chapters {
      background: var(--btn); color: var(--btn-text);
      border: none; border-radius: 8px;
      padding: 6px 12px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s;
    }
    .btn-chapters:active { opacity: .75; }

    /* ── Progress bars ───────────────────────── */
    .progress-section { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .progress-row { display: flex; flex-direction: column; gap: 5px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--hint);
    }
    .progress-track {
      height: 5px; background: rgba(255,255,255,.1); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
    .progress-fill.read  { background: var(--accent); }
    .progress-fill.test  { background: var(--green); }

    /* ── Source link ─────────────────────────── */
    .book-link {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--link); font-size: 13px; text-decoration: none;
      margin-top: 12px;
    }
    .book-link:active { opacity: .7; }

    /* ── Chapters screen ─────────────────────── */
    #chapters-screen { background: var(--bg); }
    .back-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .back-bar span { color: var(--accent); font-size: 16px; font-weight: 500; }
    .chapters-book-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .chapters-book-author { font-size: 13px; color: var(--hint); margin-bottom: 16px; }
    .chapter-item {
      display: flex; align-items: center;
      background: var(--bg2); border-radius: 10px;
      padding: 13px 14px; margin-bottom: 8px;
      gap: 12px;
    }
    .chapter-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(74,158,255,.15); color: var(--accent);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chapter-name { font-size: 15px; flex: 1; }

    /* ── Tests screen ────────────────────────── */
    .test-card {
      background: var(--bg2); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px;
    }
    .test-book-name { font-size: 13px; color: var(--hint); margin-bottom: 4px; }
    .test-question { font-size: 15px; font-weight: 600; margin-bottom: 14px; line-height: 1.4; }
    .test-options { display: flex; flex-direction: column; gap: 8px; }
    .test-option {
      background: rgba(255,255,255,.06); border: 1.5px solid transparent;
      border-radius: 10px; padding: 11px 14px;
      font-size: 14px; cursor: pointer; text-align: left;
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .test-option:active { background: rgba(255,255,255,.12); }
    .test-option.correct  { background: rgba(50,215,75,.12);  border-color: var(--green); }
    .test-option.wrong    { background: rgba(255,69,58,.12);   border-color: #ff453a; }
    .test-result { font-size: 13px; margin-top: 10px; color: var(--hint); min-height: 18px; }

    /* ── Empty state ─────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--hint);
    }
    .empty svg { opacity: .3; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    /* ── Scrollbar ───────────────────────────── */
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- BOOKS SCREEN -->
  <div id="books-screen" class="screen">
    <div class="section-title">Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- CHAPTERS SCREEN -->
  <div id="chapters-screen" class="screen hidden">
    <div class="back-bar" onclick="showBooks()">
      <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
        <path d="M8 1L1 8L8 15" stroke="#4a9eff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Назад</span>
    </div>
    <div id="chapters-book-title" class="chapters-book-title"></div>
    <div id="chapters-book-author" class="chapters-book-author"></div>
    <div id="chapters-list"></div>
  </div>

  <!-- TESTS SCREEN -->
  <div id="tests-screen" class="screen hidden">
    <div class="section-title">Тесты</div>
    <div id="tests-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav>
    <button class="nav-btn active" id="nav-books" onclick="switchTab('books')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="2"/>
      </svg>
      Книги
    </button>
    <button class="nav-btn" id="nav-tests" onclick="switchTab('tests')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="9" y="3" width="13" height="2" rx="1" fill="currentColor"/>
        <rect x="9" y="11" width="13" height="2" rx="1" fill="currentColor"/>
        <rect x="9" y="19" width="13" height="2" rx="1" fill="currentColor"/>
        <circle cx="4" cy="4" r="2" fill="currentColor"/>
        <circle cx="4" cy="12" r="2" fill="currentColor"/>
        <circle cx="4" cy="20" r="2" fill="currentColor"/>
      </svg>
      Тесты
    </button>
  </nav>

</div>

<script>
// ── Mock data ───────────────────────────────────────────────────────────────
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Удивительная сила крошечных улучшений","Как привычки формируют вашу личность","Как накапливать хорошие привычки","Закон 1: сделай это очевидным","Закон 2: сделай это привлекательным","Закон 3: сделай это лёгким","Закон 4: сделай это приятным","Продвинутая тактика"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=SHIbAwAAQBAJ",
    chapters: ["Два вида мышления","Внимание и усилие","Ленивый контролёр","Ассоциативная машина","Когнитивная лёгкость","Нормы, удивление и причинность","Машина для поспешных выводов"]
  },
  {
    id: 3,
    title: "Гибкий ум",
    author: "Эстанислао Бахрах",
    reading_progress: 100,
    test_progress: 85,
    url: "https://books.google.com/books?q=Гибкий+ум+Бахрах",
    chapters: ["Что такое творчество","Левое и правое полушария","Расширение границ","Практика воображения","Творческое мышление в жизни"]
  }
];

const tests = [
  {
    bookId: 1,
    question: "Какой минимальный процент улучшения каждый день даёт значительный рост за год?",
    options: ["0.5%", "1%", "2%", "5%"],
    correct: 1
  },
  {
    bookId: 1,
    question: "Какой из «законов» Клира говорит о том, что нужно сделать привычку видимой?",
    options: ["Закон 2", "Закон 1", "Закон 3", "Закон 4"],
    correct: 1
  },
  {
    bookId: 2,
    question: "Как Канеман называет быстрое интуитивное мышление?",
    options: ["Система 0", "Система 1", "Система 2", "Система 3"],
    correct: 1
  }
];

// ── State ────────────────────────────────────────────────────────────────────
let currentTab = 'books';
let testAnswers = {};

// ── Telegram Web App ─────────────────────────────────────────────────────────
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + '-screen').classList.remove('hidden');
  document.getElementById('nav-' + tab).classList.add('active');
}

// ── Books ────────────────────────────────────────────────────────────────────
function renderBooks() {
  const el = document.getElementById('books-list');
  if (!books.length) {
    el.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.5"/></svg>
      <p>Книг пока нет.<br>Добавь первую через бота.</p>
    </div>`;
    return;
  }
  el.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-header">
        <div class="book-meta">
          <div class="book-title">${esc(b.title)}</div>
          <div class="book-author">${esc(b.author)}</div>
        </div>
        <div class="book-actions">
          <button class="btn-chapters" onclick="showChapters(${b.id})">Главы</button>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-row">
          <div class="progress-label">
            <span>📖 Чтение</span>
            <span>${b.reading_progress}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill read" style="width:${b.reading_progress}%"></div>
          </div>
        </div>
        <div class="progress-row">
          <div class="progress-label">
            <span>✅ Тесты</span>
            <span>${b.test_progress}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill test" style="width:${b.test_progress}%"></div>
          </div>
        </div>
      </div>

      ${b.url ? `<a class="book-link" href="${esc(b.url)}" target="_blank">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M1 7H13M7 1L13 7L7 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Источник книги
      </a>` : ''}
    </div>
  `).join('');
}

// ── Chapters ─────────────────────────────────────────────────────────────────
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-book-title').textContent = book.title;
  document.getElementById('chapters-book-author').textContent = book.author;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${esc(ch)}</div>
    </div>
  `).join('');

  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('chapters-screen').classList.remove('hidden');
}

function showBooks() {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('books-screen').classList.remove('hidden');
}

// ── Tests ────────────────────────────────────────────────────────────────────
function renderTests() {
  const el = document.getElementById('tests-list');
  if (!tests.length) {
    el.innerHTML = `<div class="empty"><p>Тестов пока нет.<br>Сначала добавь книги.</p></div>`;
    return;
  }
  el.innerHTML = tests.map((t, ti) => {
    const book = books.find(b => b.id === t.bookId);
    return `
      <div class="test-card" id="test-${ti}">
        <div class="test-book-name">${book ? esc(book.title) : 'Книга'}</div>
        <div class="test-question">${esc(t.question)}</div>
        <div class="test-options">
          ${t.options.map((opt, oi) => `
            <button class="test-option" id="opt-${ti}-${oi}" onclick="answerTest(${ti}, ${oi})">
              ${esc(opt)}
            </button>
          `).join('')}
        </div>
        <div class="test-result" id="result-${ti}"></div>
      </div>
    `;
  }).join('');
}

function answerTest(ti, oi) {
  if (testAnswers[ti] !== undefined) return; // уже ответили
  testAnswers[ti] = oi;
  const test = tests[ti];
  const resultEl = document.getElementById('result-' + ti);

  test.options.forEach((_, idx) => {
    const btn = document.getElementById(`opt-${ti}-${idx}`);
    btn.disabled = true;
    if (idx === test.correct) btn.classList.add('correct');
    else if (idx === oi)      btn.classList.add('wrong');
  });

  if (oi === test.correct) {
    resultEl.textContent = '✅ Верно!';
    resultEl.style.color = 'var(--green)';
  } else {
    resultEl.textContent = `❌ Неверно. Правильный ответ: «${test.options[test.correct]}»`;
    resultEl.style.color = '#ff453a';
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderBooks();
renderTests();
</script>
</body>
</html>
