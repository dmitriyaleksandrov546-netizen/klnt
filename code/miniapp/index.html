<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --radius: 14px;
    --tab-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TABS ── */
  .tabs {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--bg2);
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    transition: color .2s;
    padding-bottom: 4px;
  }
  .tab-btn.active { color: var(--btn); }
  .tab-btn svg { width: 24px; height: 24px; }

  /* ── SCREENS ── */
  .screen {
    display: none;
    padding: 16px 16px calc(var(--tab-h) + 16px + env(safe-area-inset-bottom));
    min-height: 100vh;
  }
  .screen.active { display: block; }

  /* ── HEADER ── */
  .screen-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .screen-header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .back-btn {
    width: 32px; height: 32px;
    background: var(--bg2);
    border: none;
    border-radius: 50%;
    color: var(--btn);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    position: relative;
  }
  .book-card:active { transform: scale(0.98); opacity: 0.9; }

  .book-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 14px;
  }

  /* progress bars */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--hint);
    width: 64px;
    flex-shrink: 0;
  }
  .progress-track {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .progress-fill.read  { background: var(--btn); }
  .progress-fill.tests { background: #30d158; }
  .progress-pct {
    font-size: 11px;
    color: var(--hint);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* card footer */
  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .book-link {
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .book-link:hover { text-decoration: underline; }
  .chapters-btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .chapters-btn:active { opacity: 0.8; }

  /* ── CHAPTERS VIEW ── */
  #chapters-screen .book-meta {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  #chapters-screen .book-meta .book-title { font-size: 17px; }
  #chapters-screen .book-meta .book-author { margin-bottom: 0; }

  .chapter-list { display: flex; flex-direction: column; gap: 2px; }
  .chapter-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg2);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  .chapter-item:active { background: rgba(255,255,255,0.1); }
  .chapter-num {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--hint);
    flex-shrink: 0;
  }

  /* ── TESTS ── */
  .test-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .test-book-name {
    font-size: 12px;
    color: var(--btn);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .test-question {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .test-options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .option-btn:active { background: rgba(255,255,255,0.12); }
  .option-btn.correct { background: rgba(48,209,88,0.15); border-color: #30d158; color: #30d158; }
  .option-btn.wrong   { background: rgba(255,69,58,0.15);  border-color: #ff453a; color: #ff453a; }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--hint);
  }
  .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }
</style>
</head>
<body>

<!-- ══════ BOOKS SCREEN ══════ -->
<div id="books-screen" class="screen active">
  <div class="screen-header"><h1>Мои книги</h1></div>
  <div id="books-list"></div>
</div>

<!-- ══════ CHAPTERS SCREEN ══════ -->
<div id="chapters-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showBooks()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1>Главы</h1>
  </div>
  <div id="chapters-book-meta" class="book-meta"></div>
  <div id="chapters-list" class="chapter-list"></div>
</div>

<!-- ══════ TESTS SCREEN ══════ -->
<div id="tests-screen" class="screen">
  <div class="screen-header"><h1>Тесты</h1></div>
  <div id="tests-list"></div>
</div>

<!-- ══════ TAB BAR ══════ -->
<nav class="tabs">
  <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="tab-btn" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
// ── init Telegram WebApp ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('bg_color'); }

// ── MOCK DATA ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=lFhbDwAAQBAJ",
    chapters: ["Введение","Глава 1: Удивительная сила маленьких привычек","Глава 2: Как ваши привычки формируют вашу личность","Глава 3: Лучший способ начать новую привычку","Глава 4: Человек, который не выглядит как бегун","Глава 5: Лучший способ поддерживать новые привычки"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=thinking-fast-and-slow",
    chapters: ["Введение","Глава 1: Действующие лица истории","Глава 2: Внимание и усилие","Глава 3: Ленивый контролёр"]
  },
  {
    id: 3,
    title: "Богатый папа, бедный папа",
    author: "Роберт Кийосаки",
    reading_progress: 100,
    test_progress: 80,
    url: "https://books.google.com/books?q=rich+dad+poor+dad+kiyosaki",
    chapters: ["Глава 1: Богатый папа, бедный папа","Глава 2: Зачем обучать финансовой грамотности","Глава 3: Занимайся своим делом","Глава 4: История о налогах","Глава 5: Богатые изобретают деньги"]
  }
];

const tests = [
  {
    book_id: 1,
    question: "Сколько времени, по словам Джеймса Клира, нужно для формирования привычки?",
    options: ["21 день", "66 дней", "Нет фиксированного срока", "3 месяца"],
    correct: 2
  },
  {
    book_id: 1,
    question: "Что такое «эффект плато скрытого потенциала» по Клиру?",
    options: ["Быстрый рост в начале обучения", "Период когда результаты не видны но накапливаются", "Снижение мотивации", "Пик продуктивности"],
    correct: 1
  },
  {
    book_id: 2,
    question: "Как Канеман называет быструю интуитивную систему мышления?",
    options: ["Система А", "Система 1", "Система Б", "Система Alpha"],
    correct: 1
  }
];

// ── STATE ──
let currentTab = 'books';
let answeredTests = {};

// ── RENDER BOOKS ──
function renderBooks() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <p>Книг пока нет.<br>Добавьте первую через бота.</p>
    </div>`;
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${esc(b.title)}</div>
      <div class="book-author">${esc(b.author)}</div>

      <div class="progress-row">
        <span class="progress-label">Чтение</span>
        <div class="progress-track">
          <div class="progress-fill read" style="width:${b.reading_progress}%"></div>
        </div>
        <span class="progress-pct">${b.reading_progress}%</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">Тесты</span>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${b.test_progress}%"></div>
        </div>
        <span class="progress-pct">${b.test_progress}%</span>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${esc(b.url)}" target="_blank" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Источник
        </a>
        <button class="chapters-btn" onclick="showChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── RENDER CHAPTERS ──
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-book-meta').innerHTML = `
    <div class="book-title">${esc(book.title)}</div>
    <div class="book-author">${esc(book.author)}</div>
  `;

  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <span>${esc(ch)}</span>
    </div>
  `).join('');

  // hide books, show chapters (no tab switch)
  document.getElementById('books-screen').classList.remove('active');
  document.getElementById('chapters-screen').classList.add('active');
  if (tg) tg.BackButton.show();
}

function showBooks() {
  document.getElementById('chapters-screen').classList.remove('active');
  document.getElementById('books-screen').classList.add('active');
  if (tg) tg.BackButton.hide();
}

// ── RENDER TESTS ──
function renderTests() {
  const container = document.getElementById('tests-list');
  if (!tests.length) {
    container.innerHTML = `<div class="empty-state"><p>Тестов пока нет.</p></div>`;
    return;
  }
  container.innerHTML = tests.map((t, idx) => {
    const book = books.find(b => b.id === t.book_id);
    return `
      <div class="test-card" id="test-${idx}">
        <div class="test-book-name">${book ? esc(book.title) : ''}</div>
        <div class="test-question">${esc(t.question)}</div>
        <div class="test-options">
          ${t.options.map((opt, oi) => `
            <button class="option-btn" onclick="answerTest(${idx}, ${oi})">${esc(opt)}</button>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function answerTest(testIdx, optionIdx) {
  if (answeredTests[testIdx] !== undefined) return;
  answeredTests[testIdx] = optionIdx;

  const t = tests[testIdx];
  const card = document.getElementById(`test-${testIdx}`);
  const btns = card.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === t.correct) btn.classList.add('correct');
    else if (i === optionIdx && optionIdx !== t.correct) btn.classList.add('wrong');
  });
  if (tg) tg.HapticFeedback.notificationOccurred(optionIdx === t.correct ? 'success' : 'error');
}

// ── TAB SWITCH ──
function switchTab(tab) {
  // can't switch to tab while in chapters view
  if (document.getElementById('chapters-screen').classList.contains('active')) {
    showBooks();
  }
  currentTab = tab;

  ['books','tests'].forEach(t => {
    document.getElementById(`${t}-screen`).classList.toggle('active', t === tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
}

// ── UTILS ──
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Telegram BackButton ──
if (tg) {
  tg.BackButton.onClick(() => {
    if (document.getElementById('chapters-screen').classList.contains('active')) {
      showBooks();
    }
  });
}

// ── INIT ──
renderBooks();
renderTests();
</script>
</body>
</html>
