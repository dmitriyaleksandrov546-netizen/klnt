<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --accent: #0a84ff;
    --green: #30d158;
    --radius: 14px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    font-size: 16px;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  #screen {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 8px;
  }

  /* ── TABS ── */
  #tabbar {
    display: flex;
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 0;
    transition: opacity .15s;
  }
  .tab:active { opacity: .6; }

  .tab-icon { font-size: 22px; line-height: 1; }

  .tab-label {
    font-size: 11px;
    color: var(--hint);
    transition: color .15s;
  }

  .tab.active .tab-label { color: var(--accent); }
  .tab.active .tab-icon { filter: none; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 16px;
  }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .12s, opacity .12s;
  }
  .book-card:active { transform: scale(0.98); opacity: .85; }

  .book-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .book-meta { flex: 1; min-width: 0; }

  .book-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .book-author {
    font-size: 13px;
    color: var(--hint);
  }

  .book-arrow {
    color: var(--hint);
    font-size: 18px;
    margin-left: 8px;
    flex-shrink: 0;
    align-self: center;
  }

  /* ── PROGRESS ── */
  .progress-block { margin-bottom: 8px; }
  .progress-block:last-of-type { margin-bottom: 12px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 5px;
  }

  .progress-label span:last-child {
    font-weight: 600;
    color: var(--text);
  }

  .progress-bar {
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .4s ease;
  }

  .progress-fill.reading { background: var(--accent); }
  .progress-fill.tests   { background: var(--green); }

  /* ── BOOK LINK ── */
  .book-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
    margin-bottom: 12px;
  }
  .book-link:active { opacity: .7; }

  /* ── CHAPTERS BTN ── */
  .btn-chapters {
    width: 100%;
    background: rgba(10,132,255,0.15);
    color: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .12s;
  }
  .btn-chapters:active { opacity: .7; }

  /* ── CHAPTERS VIEW ── */
  #chapters-view { display: none; }
  #chapters-view.visible { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 16px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .back-btn:active { opacity: .7; }

  .chapters-book-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .chapters-book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 16px;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    gap: 12px;
  }

  .chapter-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(10,132,255,0.15);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .chapter-name {
    font-size: 15px;
    font-weight: 500;
  }

  /* ── TESTS TAB ── */
  .quiz-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .quiz-book-tag {
    display: inline-block;
    background: rgba(10,132,255,0.15);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .quiz-question {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .quiz-options { display: flex; flex-direction: column; gap: 8px; }

  .quiz-option {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: all .12s;
    text-align: left;
    color: var(--text);
  }
  .quiz-option:active { opacity: .7; }
  .quiz-option.correct {
    border-color: var(--green);
    background: rgba(48,209,88,0.12);
    color: var(--green);
  }
  .quiz-option.wrong {
    border-color: #ff453a;
    background: rgba(255,69,58,0.1);
    color: #ff453a;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--hint);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.5; }

  /* ── BOOKS LIST / CHAPTERS TOGGLE ── */
  #books-list { display: block; }
  #books-list.hidden { display: none; }
</style>
</head>
<body>

<div id="app">
  <div id="screen">

    <!-- ВКЛАДКА: КНИГИ -->
    <div id="tab-books" class="tab-content" style="display:block;">
      <div id="books-list">
        <div class="section-title">Мои книги</div>
        <div id="books-container"></div>
      </div>

      <div id="chapters-view">
        <button class="back-btn" onclick="closeChapters()">
          ‹ Назад
        </button>
        <div class="chapters-book-title" id="chap-title"></div>
        <div class="chapters-book-author" id="chap-author"></div>
        <div id="chapters-container"></div>
      </div>
    </div>

    <!-- ВКЛАДКА: ТЕСТЫ -->
    <div id="tab-tests" class="tab-content" style="display:none;">
      <div class="section-title">Тесты</div>
      <div id="tests-container"></div>
    </div>

  </div>

  <!-- TABBAR -->
  <div id="tabbar">
    <div class="tab active" id="tab-btn-books" onclick="switchTab('books')">
      <div class="tab-icon">📚</div>
      <div class="tab-label">Книги</div>
    </div>
    <div class="tab" id="tab-btn-tests" onclick="switchTab('tests')">
      <div class="tab-icon">✏️</div>
      <div class="tab-label">Тесты</div>
    </div>
  </div>
</div>

<script>
// ── Telegram Web App init ──
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// ── Mock данные ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Введение", "Удивительная сила атомных привычек", "Как привычки формируют вашу идентичность", "Как создать хорошую привычку", "Первый закон: сделать это очевидным", "Второй закон: сделать это привлекательным", "Третий закон: сделать это простым", "Четвёртый закон: сделать это приятным"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=ZuKTvERuPG8C",
    chapters: ["Персонажи истории", "Внимание и усилие", "Ленивый контролёр", "Ассоциативная машина", "Когнитивная лёгкость", "Нормы, сюрпризы и причины"]
  },
  {
    id: 3,
    title: "Sapiens: Краткая история человечества",
    author: "Юваль Ной Харари",
    reading_progress: 85,
    test_progress: 70,
    url: "https://books.google.com/books?id=1EiJAwAAQBAJ",
    chapters: ["Незначительное животное", "Древо познания", "День в жизни Адама и Евы", "Потоп", "История крупнейшей лжи", "Строительство пирамид"]
  }
];

const quizzes = [
  {
    bookId: 1,
    bookTitle: "Атомные привычки",
    question: "Что такое «атомная привычка» по Джеймсу Клиру?",
    options: ["Привычка, связанная с физикой", "Маленькое улучшение в 1%, которое со временем даёт огромный результат", "Ежедневный ритуал утром", "Привычка требующая усилий"],
    correct: 1
  },
  {
    bookId: 1,
    bookTitle: "Атомные привычки",
    question: "Что является первым законом формирования привычек?",
    options: ["Сделать это приятным", "Сделать это простым", "Сделать это очевидным", "Сделать это срочным"],
    correct: 2
  },
  {
    bookId: 2,
    bookTitle: "Думай медленно...",
    question: "Как Канеман называет быстрое, интуитивное мышление?",
    options: ["Система 0", "Система 1", "Система 2", "Система А"],
    correct: 1
  }
];

// ── Рендер книг ──
function renderBooks() {
  const container = document.getElementById('books-container');
  if (books.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📖</div>
        <p>Пока нет книг.<br>Добавьте первую через бота.</p>
      </div>`;
    return;
  }

  container.innerHTML = books.map(book => `
    <div class="book-card" onclick="openChapters(${book.id})">
      <div class="book-header">
        <div class="book-meta">
          <div class="book-title">${escHtml(book.title)}</div>
          <div class="book-author">${escHtml(book.author)}</div>
        </div>
        <div class="book-arrow">›</div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Прочитано</span>
          <span>${book.reading_progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill reading" style="width:${book.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Тесты</span>
          <span>${book.test_progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill tests" style="width:${book.test_progress}%"></div>
        </div>
      </div>

      ${book.url ? `<a class="book-link" href="${escHtml(book.url)}" target="_blank" onclick="event.stopPropagation()">🔗 Открыть на Google Books</a>` : ''}

      <button class="btn-chapters" onclick="event.stopPropagation(); openChapters(${book.id})">
        Главы (${book.chapters.length}) →
      </button>
    </div>
  `).join('');
}

// ── Главы ──
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chap-title').textContent = book.title;
  document.getElementById('chap-author').textContent = book.author;

  document.getElementById('chapters-container').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${escHtml(ch)}</div>
    </div>
  `).join('');

  document.getElementById('books-list').classList.add('hidden');
  document.getElementById('chapters-view').classList.add('visible');

  document.getElementById('screen').scrollTop = 0;

  if (tg?.BackButton) {
    tg.BackButton.show();
    tg.BackButton.onClick(closeChapters);
  }
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('visible');
  document.getElementById('books-list').classList.remove('hidden');
  document.getElementById('screen').scrollTop = 0;

  if (tg?.BackButton) {
    tg.BackButton.hide();
    tg.BackButton.offClick(closeChapters);
  }
}

// ── Рендер тестов ──
function renderTests() {
  const container = document.getElementById('tests-container');
  if (quizzes.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">✏️</div>
        <p>Тесты появятся после добавления книг и глав.</p>
      </div>`;
    return;
  }

  container.innerHTML = quizzes.map((q, qi) => `
    <div class="quiz-card" id="quiz-${qi}">
      <div class="quiz-book-tag">${escHtml(q.bookTitle)}</div>
      <div class="quiz-question">${escHtml(q.question)}</div>
      <div class="quiz-options">
        ${q.options.map((opt, oi) => `
          <button class="quiz-option" onclick="answerQuiz(${qi}, ${oi})" id="quiz-${qi}-opt-${oi}">
            ${escHtml(opt)}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function answerQuiz(quizIdx, optIdx) {
  const q = quizzes[quizIdx];
  const opts = document.querySelectorAll(`#quiz-${quizIdx} .quiz-option`);

  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === optIdx && optIdx !== q.correct) btn.classList.add('wrong');
  });

  if (tg?.HapticFeedback) {
    if (optIdx === q.correct) tg.HapticFeedback.notificationOccurred('success');
    else tg.HapticFeedback.notificationOccurred('error');
  }
}

// ── Переключение вкладок ──
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.getElementById(`tab-btn-${tab}`).classList.add('active');

  document.getElementById('screen').scrollTop = 0;

  // Сброс вида глав при переключении
  if (tab !== 'books') {
    closeChapters();
  }
}

// ── Утилиты ──
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ──
renderBooks();
renderTests();
</script>
</body>
</html>
