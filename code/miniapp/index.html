<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BookBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:        var(--tg-theme-bg-color,        #1c1c1e);
      --bg2:       var(--tg-theme-secondary-bg-color, #2c2c2e);
      --text:      var(--tg-theme-text-color,       #ffffff);
      --hint:      var(--tg-theme-hint-color,       #8e8e93);
      --link:      var(--tg-theme-link-color,       #0a84ff);
      --btn:       var(--tg-theme-button-color,     #0a84ff);
      --btn-text:  var(--tg-theme-button-text-color,#ffffff);
      --accent:    #0a84ff;
      --green:     #30d158;
      --radius:    14px;
      --tab-h:     60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.4;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── TABS NAV ── */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: var(--bg2);
      display: flex;
      border-top: 1px solid rgba(255,255,255,.08);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      color: var(--hint);
      transition: color .2s;
      background: none;
      border: none;
      font-size: 11px;
      font-weight: 500;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn svg { width: 24px; height: 24px; }

    /* ── PAGES ── */
    .page {
      display: none;
      padding: 16px 16px calc(var(--tab-h) + 16px + env(safe-area-inset-bottom));
      min-height: 100vh;
    }
    .page.active { display: block; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -.3px;
    }

    /* ── BOOK CARD ── */
    .book-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .book-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .book-cover {
      width: 48px; height: 64px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent) 0%, #5e5ce6 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .book-meta { flex: 1; min-width: 0; }
    .book-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .book-author { font-size: 13px; color: var(--hint); }

    /* ── PROGRESS ── */
    .progress-block { margin-bottom: 10px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 5px;
    }
    .progress-label span:last-child { font-weight: 600; color: var(--text); }
    .progress-track {
      height: 5px;
      background: rgba(255,255,255,.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
    }
    .progress-fill.reading { background: var(--accent); }
    .progress-fill.tests   { background: var(--green); }

    /* ── CARD FOOTER ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .book-link {
      font-size: 13px;
      color: var(--link);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .book-link svg { width: 14px; height: 14px; }
    .btn-chapters {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-chapters:active { opacity: .75; }

    /* ── CHAPTERS VIEW ── */
    #chapters-view { display: none; }
    #chapters-view.active { display: block; }
    #books-list-view { display: block; }
    #books-list-view.hidden { display: none; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--link);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 16px;
    }
    .back-btn svg { width: 20px; height: 20px; }

    .chapters-book-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .chapters-book-author {
      font-size: 14px;
      color: var(--hint);
      margin-bottom: 20px;
    }

    .chapter-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg2);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .chapter-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(10,132,255,.18);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chapter-name { font-size: 15px; font-weight: 500; }

    /* ── TESTS PAGE ── */
    .test-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .test-book-tag {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .test-question {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      line-height: 1.45;
    }
    .test-options { display: flex; flex-direction: column; gap: 8px; }
    .test-option {
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,.12);
      font-size: 14px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      background: none;
      color: var(--text);
      text-align: left;
    }
    .test-option:active { background: rgba(10,132,255,.15); }
    .test-option.correct { background: rgba(48,209,88,.15); border-color: var(--green); color: var(--green); }
    .test-option.wrong   { background: rgba(255,69,58,.15);  border-color: #ff453a; color: #ff453a; }
    .test-option.disabled { pointer-events: none; }

    .test-result {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }
    .test-result.show { display: block; }
    .test-result.ok  { color: var(--green); }
    .test-result.bad { color: #ff453a; }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      color: var(--hint);
      padding: 60px 20px;
      font-size: 15px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- ══ BOOKS PAGE ══ -->
<div id="page-books" class="page active">

  <!-- Список книг -->
  <div id="books-list-view">
    <div class="section-title">📚 Мои книги</div>
    <div id="books-container"></div>
  </div>

  <!-- Главы книги -->
  <div id="chapters-view">
    <button class="back-btn" onclick="closeChapters()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Назад
    </button>
    <div class="chapters-book-title" id="chapters-title"></div>
    <div class="chapters-book-author" id="chapters-author"></div>
    <div id="chapters-list"></div>
  </div>
</div>

<!-- ══ TESTS PAGE ══ -->
<div id="page-tests" class="page">
  <div class="section-title">✏️ Тесты</div>
  <div id="tests-container"></div>
</div>

<!-- ══ TAB BAR ══ -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="tab-btn" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
// ══ TELEGRAM SDK ══
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ══ MOCK DATA ══
const books = [
  {
    id: 1,
    emoji: "⚛️",
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=lFhbDwAAQBAJ",
    chapters: ["Введение. Почему маленькие изменения дают большой результат", "Глава 1. Удивительная сила атомных привычек", "Глава 2. Как привычки формируют вашу идентичность", "Глава 3. Как создать привычку (и как её сломать)", "Глава 4. Человек, который не видит систему", "Глава 5. Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    emoji: "🧠",
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=ZuKTvERuPG8C",
    chapters: ["Глава 1. Действующие лица", "Глава 2. Внимание и усилие", "Глава 3. Ленивый контролёр", "Глава 4. Ассоциативная машина", "Глава 5. Когнитивная лёгкость"]
  },
  {
    id: 3,
    emoji: "🚀",
    title: "От нуля к единице",
    author: "Питер Тиль",
    reading_progress: 100,
    test_progress: 80,
    url: "https://books.google.com/books?id=_eKZEAAAQBAJ",
    chapters: ["Глава 1. Будущее: прогресс или стагнация?", "Глава 2. Вечеринка 1999 года", "Глава 3. Все успешные компании-монополисты", "Глава 4. Идеология конкуренции", "Глава 5. Преимущество последнего хода", "Глава 6. Вы не лотерейный билет", "Глава 7. Деньги и удача"]
  }
];

const tests = [
  {
    bookId: 1,
    question: "Что такое «атомная привычка» по Джеймсу Клиру?",
    options: [
      "Привычка, связанная с химическими процессами",
      "Маленькое изменение, дающее удивительные результаты со временем",
      "Привычка, которую невозможно сломать",
      "Привычка, занимающая меньше 2 минут"
    ],
    correct: 1
  },
  {
    bookId: 1,
    question: "Правило двух минут предполагает, что новая привычка должна занимать...",
    options: [
      "Ровно 120 секунд каждый день",
      "Не более двух минут в начале",
      "Две минуты плюс постепенное увеличение",
      "Максимум две попытки в день"
    ],
    correct: 1
  },
  {
    bookId: 2,
    question: "Система 1 в теории Канемана — это...",
    options: [
      "Медленное аналитическое мышление",
      "Сознательный контроль поведения",
      "Быстрое автоматическое мышление",
      "Долгосрочная память"
    ],
    correct: 2
  }
];

// ══ RENDER BOOKS ══
function renderBooks() {
  const container = document.getElementById('books-container');
  if (!books.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Книг пока нет.<br>Добавьте книгу через бота.</div>';
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-header">
        <div class="book-cover">${b.emoji}</div>
        <div class="book-meta">
          <div class="book-title">${b.title}</div>
          <div class="book-author">${b.author}</div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Чтение</span>
          <span>${b.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill reading" style="width:${b.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Тесты</span>
          <span>${b.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${b.test_progress}%"></div>
        </div>
      </div>

      <div class="card-footer">
        <a class="book-link" href="${b.url}" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Источник
        </a>
        <button class="btn-chapters" onclick="openChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ══ CHAPTERS VIEW ══
function openChapters(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;

  document.getElementById('chapters-title').textContent = b.title;
  document.getElementById('chapters-author').textContent = b.author;
  document.getElementById('chapters-list').innerHTML = b.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${ch}</div>
    </div>
  `).join('');

  document.getElementById('books-list-view').classList.add('hidden');
  document.getElementById('chapters-view').classList.add('active');

  if (tg) tg.BackButton.show();
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('active');
  document.getElementById('books-list-view').classList.remove('hidden');
  if (tg) tg.BackButton.hide();
}

if (tg) {
  tg.BackButton.onClick(() => {
    if (document.getElementById('chapters-view').classList.contains('active')) {
      closeChapters();
    }
  });
}

// ══ RENDER TESTS ══
function renderTests() {
  const container = document.getElementById('tests-container');
  if (!tests.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📝</div>Тестов пока нет.</div>';
    return;
  }
  container.innerHTML = tests.map((t, idx) => {
    const book = books.find(b => b.id === t.bookId);
    return `
      <div class="test-card" id="test-${idx}">
        <div class="test-book-tag">${book ? book.title : 'Книга'}</div>
        <div class="test-question">${t.question}</div>
        <div class="test-options">
          ${t.options.map((opt, oi) => `
            <button class="test-option" onclick="answerTest(${idx}, ${oi})">${opt}</button>
          `).join('')}
        </div>
        <div class="test-result" id="test-result-${idx}"></div>
      </div>
    `;
  }).join('');
}

function answerTest(testIdx, optIdx) {
  const t = tests[testIdx];
  const card = document.getElementById(`test-${testIdx}`);
  const result = document.getElementById(`test-result-${testIdx}`);
  const btns = card.querySelectorAll('.test-option');

  btns.forEach(b => b.classList.add('disabled'));
  btns[optIdx].classList.add(optIdx === t.correct ? 'correct' : 'wrong');
  if (optIdx !== t.correct) btns[t.correct].classList.add('correct');

  result.classList.add('show');
  if (optIdx === t.correct) {
    result.classList.add('ok');
    result.textContent = '✓ Правильно!';
  } else {
    result.classList.add('bad');
    result.textContent = `✗ Неверно. Правильный ответ: «${t.options[t.correct]}»`;
  }
}

// ══ TAB SWITCH ══
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');

  // При переходе на Книги — закрываем главы если были открыты
  if (tab === 'books') {
    closeChapters();
  }
}

// ══ INIT ══
renderBooks();
renderTests();
</script>
</body>
</html>
