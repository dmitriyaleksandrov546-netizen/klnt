<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg-secondary: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --accent: var(--tg-theme-button-color, #007aff);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --link: var(--tg-theme-link-color, #007aff);
    --card-radius: 16px;
    --tab-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 16px 16px 8px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* ===== VIEWS ===== */
  .view { display: none; padding: 0 16px 16px; }
  .view.active { display: block; }

  /* ===== BOOK CARD ===== */
  .book-card {
    background: var(--bg-secondary);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    position: relative;
  }
  .book-card:active { transform: scale(0.98); opacity: 0.85; }

  .book-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 14px;
  }

  /* Progress bars */
  .progress-group { margin-bottom: 12px; }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--hint);
    width: 90px;
    flex-shrink: 0;
  }
  .progress-track {
    flex: 1;
    height: 5px;
    background: rgba(142,142,147,0.2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .progress-fill.reading { background: var(--accent); }
  .progress-fill.tests   { background: #34c759; }
  .progress-pct {
    font-size: 12px;
    color: var(--hint);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Card footer */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .book-link {
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .book-link:active { opacity: 0.7; }
  .btn-chapters {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-chapters:active { opacity: 0.8; }

  /* ===== CHAPTERS VIEW ===== */
  .chapters-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 16px 8px;
  }
  .btn-back {
    background: none;
    border: none;
    color: var(--link);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .chapters-title {
    font-size: 17px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chapter-list { padding: 0 16px 16px; }
  .chapter-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 8px;
  }
  .chapter-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(142,142,147,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--hint);
    flex-shrink: 0;
  }
  .chapter-name { font-size: 15px; }

  /* ===== TESTS VIEW ===== */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
  }

  .test-card {
    background: var(--bg-secondary);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .test-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .test-info { flex: 1; }
  .test-book-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .test-meta { font-size: 12px; color: var(--hint); }
  .test-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    background: rgba(52,199,89,0.15);
    color: #34c759;
  }
  .test-badge.pending {
    background: rgba(255,159,10,0.15);
    color: #ff9f0a;
  }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--hint);
    padding: 60px 20px;
    font-size: 15px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ===== TAB BAR ===== */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: calc(var(--tab-h) + env(safe-area-inset-bottom));
    background: var(--bg-secondary);
    border-top: 1px solid rgba(142,142,147,0.15);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
    border: none;
    background: none;
    color: var(--hint);
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { color: var(--accent); }
  .tab:active { opacity: 0.7; }
  .tab-icon { font-size: 22px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 500; }
</style>
</head>
<body>

<!-- BOOKS VIEW -->
<div id="view-books" class="view active">
  <div class="header">📚 Книги</div>
  <div id="books-list"></div>
</div>

<!-- CHAPTERS VIEW -->
<div id="view-chapters" class="view">
  <div class="chapters-header">
    <button class="btn-back" id="btn-back">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
        <path d="M8.5 1L1.5 8L8.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Назад
    </button>
    <div class="chapters-title" id="chapters-title"></div>
  </div>
  <div class="chapter-list" id="chapters-list"></div>
</div>

<!-- TESTS VIEW -->
<div id="view-tests" class="view">
  <div class="header">✏️ Тесты</div>
  <div id="tests-list"></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" data-tab="books">
    <span class="tab-icon">📚</span>
    <span class="tab-label">Книги</span>
  </button>
  <button class="tab" data-tab="tests">
    <span class="tab-icon">✏️</span>
    <span class="tab-label">Тесты</span>
  </button>
</div>

<script>
// ── Init Telegram WebApp ───────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// ── Mock data ──────────────────────────────────────────────────────────────
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила атомных привычек", "Глава 2. Как работает мозг при формировании привычек", "Глава 3. Первый закон: сделайте привычку очевидной", "Глава 4. Второй закон: сделайте привычку привлекательной", "Глава 5. Третий закон: сделайте привычку простой"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=TA7Q_ZoyaloC",
    chapters: ["Глава 1. Два персонажа истории", "Глава 2. Внимание и усилие", "Глава 3. Ленивый контролёр", "Глава 4. Ассоциативная машина", "Глава 5. Когнитивная лёгкость", "Глава 6. Нормы, неожиданности и причины"]
  },
  {
    id: 3,
    title: "Сапиенс",
    author: "Юваль Ной Харари",
    reading_progress: 85,
    test_progress: 70,
    url: "https://books.google.com/books?id=1EiJAwAAQBAJ",
    chapters: ["Часть 1. Когнитивная революция", "Часть 2. Сельскохозяйственная революция", "Часть 3. Объединение человечества", "Часть 4. Научная революция"]
  }
];

const tests = [
  { id: 1, book_id: 1, questions: 12, completed: 4, status: "progress" },
  { id: 2, book_id: 3, questions: 10, completed: 7, status: "progress" },
  { id: 3, book_id: 2, questions: 8, completed: 0, status: "pending" }
];

// ── State ──────────────────────────────────────────────────────────────────
let activeTab = "books";
let previousView = null;

// ── Render books ───────────────────────────────────────────────────────────
function renderBooks() {
  const container = document.getElementById("books-list");
  if (!books.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📖</div>Книг пока нет.<br>Добавьте первую через бот.</div>';
    return;
  }
  container.innerHTML = books.map(book => `
    <div class="book-card" data-id="${book.id}">
      <div class="book-title">${escHtml(book.title)}</div>
      <div class="book-author">${escHtml(book.author)}</div>

      <div class="progress-group">
        <div class="progress-row">
          <span class="progress-label">📖 Чтение</span>
          <div class="progress-track">
            <div class="progress-fill reading" style="width:${book.reading_progress}%"></div>
          </div>
          <span class="progress-pct">${book.reading_progress}%</span>
        </div>
        <div class="progress-row">
          <span class="progress-label">✏️ Тесты</span>
          <div class="progress-track">
            <div class="progress-fill tests" style="width:${book.test_progress}%"></div>
          </div>
          <span class="progress-pct">${book.test_progress}%</span>
        </div>
      </div>

      <div class="card-footer">
        ${book.url
          ? `<a class="book-link" href="${book.url}" target="_blank" onclick="event.stopPropagation()">
               🔗 Источник
             </a>`
          : `<span></span>`
        }
        <button class="btn-chapters" onclick="event.stopPropagation(); openChapters(${book.id})">
          Главы
        </button>
      </div>
    </div>
  `).join("");
}

// ── Render chapters ────────────────────────────────────────────────────────
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById("chapters-title").textContent = book.title;
  const list = document.getElementById("chapters-list");
  list.innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${escHtml(ch)}</div>
    </div>
  `).join("");

  previousView = "books";
  showView("chapters");
  // Hide tab bar while in chapters
  document.querySelector(".tab-bar").style.display = "none";
}

document.getElementById("btn-back").addEventListener("click", () => {
  document.querySelector(".tab-bar").style.display = "flex";
  showView(previousView || "books");
  previousView = null;
});

// ── Render tests ───────────────────────────────────────────────────────────
function renderTests() {
  const container = document.getElementById("tests-list");
  if (!tests.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">✏️</div>Тестов пока нет.</div>';
    return;
  }

  const inProgress = tests.filter(t => t.status === "progress");
  const pending    = tests.filter(t => t.status === "pending");

  let html = "";

  if (inProgress.length) {
    html += '<div class="section-title">В процессе</div>';
    html += inProgress.map(t => renderTestCard(t)).join("");
  }
  if (pending.length) {
    html += '<div class="section-title">Не начаты</div>';
    html += pending.map(t => renderTestCard(t)).join("");
  }

  container.innerHTML = html;
}

function renderTestCard(test) {
  const book = books.find(b => b.id === test.book_id) || {};
  const pct = test.questions ? Math.round(test.completed / test.questions * 100) : 0;
  const statusText = test.status === "progress"
    ? `${test.completed} / ${test.questions} вопросов`
    : `${test.questions} вопросов`;
  const badgeClass = test.status === "progress" ? "" : "pending";
  const badgeText  = test.status === "progress" ? `${pct}%` : "Начать";

  return `
    <div class="test-card">
      <div class="test-icon">📝</div>
      <div class="test-info">
        <div class="test-book-title">${escHtml(book.title || "Книга")}</div>
        <div class="test-meta">${escHtml(statusText)}</div>
      </div>
      <div class="test-badge ${badgeClass}">${badgeText}</div>
    </div>
  `;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(`view-${name}`).classList.add("active");
  activeTab = name;
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    const name = tab.dataset.tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    showView(name);
  });
});

// ── Utils ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

// ── Boot ───────────────────────────────────────────────────────────────────
renderBooks();
renderTests();
</script>
</body>
</html>
