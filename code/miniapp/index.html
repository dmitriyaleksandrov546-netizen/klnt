<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #3478f6);
    --btn: var(--tg-theme-button-color, #3478f6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --accent-read: #30d158;
    --accent-test: #ff9f0a;
    --radius: 14px;
    --nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 16px;
    height: 100%;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: calc(var(--tg-viewport-height, 100vh));
  }

  .screen { display: none; flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
  .screen.active { display: block; }

  /* ── BOTTOM NAV ── */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg2);
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: color .2s;
  }

  .nav-btn.active { color: var(--btn); }

  .nav-btn svg { width: 24px; height: 24px; }

  /* ── PAGE HEADER ── */
  .page-header {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    active: none;
  }
  .book-card:active { transform: scale(0.98); opacity: 0.85; }

  .book-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 14px;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 11px;
    color: var(--hint);
    width: 56px;
    flex-shrink: 0;
  }

  .progress-bar {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .4s ease;
  }

  .progress-fill.read  { background: var(--accent-read); }
  .progress-fill.test  { background: var(--accent-test); }

  .progress-pct {
    font-size: 11px;
    color: var(--hint);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Card footer */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .card-link {
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-link:active { opacity: 0.7; }

  .btn-chapters {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-chapters:active { opacity: 0.8; }

  /* ── CHAPTERS VIEW ── */
  #screen-chapters { background: var(--bg); }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--link);
    font-size: 17px;
    cursor: pointer;
    margin-bottom: 16px;
    padding: 0;
  }

  .chapters-book-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .chapters-book-author {
    font-size: 14px;
    color: var(--hint);
    margin-bottom: 20px;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    background: var(--bg2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    gap: 12px;
  }

  .chapter-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--hint);
    flex-shrink: 0;
  }

  .chapter-name { font-size: 15px; font-weight: 500; }

  /* ── TESTS TAB ── */
  .test-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .test-book-name {
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .test-question {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.4;
  }

  .test-options { display: flex; flex-direction: column; gap: 8px; }

  .test-option {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: background .15s, border-color .15s;
  }

  .test-option:active { background: rgba(255,255,255,0.12); }
  .test-option.correct { background: rgba(48,209,88,0.18); border-color: var(--accent-read); }
  .test-option.wrong   { background: rgba(255,69,58,0.15);  border-color: #ff453a; }

  .test-status {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: var(--hint);
    min-height: 18px;
  }

  /* empty state */
  .empty {
    text-align: center;
    color: var(--hint);
    font-size: 15px;
    margin-top: 60px;
    line-height: 1.6;
  }
  .empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── BOOKS SCREEN ── -->
  <div id="screen-books" class="screen active">
    <div class="page-header">Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- ── CHAPTERS SCREEN ── -->
  <div id="screen-chapters" class="screen">
    <button class="back-btn" onclick="showBooks()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><polyline points="15 18 9 12 15 6"/></svg>
      Назад
    </button>
    <div class="chapters-book-title" id="chapters-title"></div>
    <div class="chapters-book-author" id="chapters-author"></div>
    <div id="chapters-list"></div>
  </div>

  <!-- ── TESTS SCREEN ── -->
  <div id="screen-tests" class="screen">
    <div class="page-header">Тесты</div>
    <div id="tests-list"></div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav>
    <button class="nav-btn active" id="nav-books" onclick="switchTab('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Книги
    </button>
    <button class="nav-btn" id="nav-tests" onclick="switchTab('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Тесты
    </button>
  </nav>
</div>

<script>
// ── Telegram WebApp init ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Mock data ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=Vw4DEAAAQBAJ",
    chapters: ["Введение. Удивительная сила маленьких привычек","Глава 1. Удивительная сила маленьких привычек","Глава 2. Как привычки формируют идентичность","Глава 3. Четыре шага к лучшим привычкам","Глава 4. Человек, который не смотрит на телефон","Глава 5. Лучший способ начать новую привычку","Глава 6. Мотивация переоценена","Глава 7. Секрет самоконтроля"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=thinking-fast-slow",
    chapters: ["Часть 1. Две системы","Часть 2. Эвристика и предубеждения","Часть 3. Самоуверенность","Часть 4. Выбор","Часть 5. Два Я"]
  },
  {
    id: 3,
    title: "Sapiens: Краткая история человечества",
    author: "Юваль Ной Харари",
    reading_progress: 0,
    test_progress: 0,
    url: "https://books.google.com/books?q=sapiens+harari",
    chapters: ["Часть 1. Когнитивная революция","Часть 2. Сельскохозяйственная революция","Часть 3. Объединение человечества","Часть 4. Научная революция"]
  }
];

const tests = [
  {
    book_id: 1,
    book_title: "Атомные привычки",
    question: "Какой минимальный прирост ежедневных улучшений даёт 37× рост за год?",
    options: ["0.5%", "1%", "2%", "5%"],
    correct: 1
  },
  {
    book_id: 1,
    book_title: "Атомные привычки",
    question: "Что стоит в центре петли привычки по Клиру?",
    options: ["Награда", "Сигнал → Желание → Реакция → Награда", "Мотивация", "Повторение"],
    correct: 1
  },
  {
    book_id: 2,
    book_title: "Думай медленно…",
    question: "Как Канеман называет быструю, интуитивную систему мышления?",
    options: ["Система 0", "Система 1", "Система 2", "Система 3"],
    correct: 1
  }
];

// ── State ──
let currentTab = 'books';
let currentBookId = null;
let testAnswers = {}; // { testIndex: chosenOption }

// ── Render: Books ──
function renderBooks() {
  const list = document.getElementById('books-list');
  if (!books.length) {
    list.innerHTML = '<div class="empty"><span class="emoji">📚</span>Книг пока нет.<br>Добавь первую через бот!</div>';
    return;
  }
  list.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${esc(b.title)}</div>
      <div class="book-author">${esc(b.author)}</div>

      <div class="progress-row">
        <span class="progress-label">Чтение</span>
        <div class="progress-bar"><div class="progress-fill read" style="width:${b.reading_progress}%"></div></div>
        <span class="progress-pct">${b.reading_progress}%</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">Тесты</span>
        <div class="progress-bar"><div class="progress-fill test" style="width:${b.test_progress}%"></div></div>
        <span class="progress-pct">${b.test_progress}%</span>
      </div>

      <div class="card-footer">
        <a class="card-link" href="${esc(b.url)}" target="_blank" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Источник
        </a>
        <button class="btn-chapters" onclick="showChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── Render: Chapters ──
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  currentBookId = bookId;

  document.getElementById('chapters-title').textContent = book.title;
  document.getElementById('chapters-author').textContent = book.author;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${esc(ch)}</div>
    </div>
  `).join('');

  // Hide books, show chapters (without switching tab nav)
  document.getElementById('screen-books').classList.remove('active');
  document.getElementById('screen-chapters').classList.add('active');
  document.getElementById('screen-tests').classList.remove('active');
}

function showBooks() {
  document.getElementById('screen-chapters').classList.remove('active');
  document.getElementById('screen-books').classList.add('active');
  if (tg) tg.BackButton.hide();
}

// ── Render: Tests ──
function renderTests() {
  const list = document.getElementById('tests-list');
  if (!tests.length) {
    list.innerHTML = '<div class="empty"><span class="emoji">✏️</span>Тестов пока нет.<br>Пройди книгу и бот сгенерирует вопросы!</div>';
    return;
  }
  list.innerHTML = tests.map((t, idx) => {
    const answered = testAnswers[idx] !== undefined;
    return `
      <div class="test-card" id="test-card-${idx}">
        <div class="test-book-name">${esc(t.book_title)}</div>
        <div class="test-question">${esc(t.question)}</div>
        <div class="test-options">
          ${t.options.map((opt, oi) => {
            let cls = 'test-option';
            if (answered) {
              if (oi === t.correct) cls += ' correct';
              else if (oi === testAnswers[idx]) cls += ' wrong';
            }
            return `<button class="test-option${answered && oi === t.correct ? ' correct' : answered && oi === testAnswers[idx] ? ' wrong' : ''}"
              onclick="answerTest(${idx}, ${oi})" ${answered ? 'disabled' : ''}>
              ${esc(opt)}
            </button>`;
          }).join('')}
        </div>
        <div class="test-status" id="test-status-${idx}">
          ${answered ? (testAnswers[idx] === t.correct ? '✅ Верно!' : `❌ Неверно. Правильный: «${esc(t.options[t.correct])}»`) : ''}
        </div>
      </div>
    `;
  }).join('');
}

function answerTest(testIdx, optionIdx) {
  if (testAnswers[testIdx] !== undefined) return;
  testAnswers[testIdx] = optionIdx;
  renderTests(); // re-render with result
}

// ── Tab switching ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('screen-books').classList.toggle('active', tab === 'books');
  document.getElementById('screen-tests').classList.toggle('active', tab === 'tests');
  document.getElementById('screen-chapters').classList.remove('active');
  document.getElementById('nav-books').classList.toggle('active', tab === 'books');
  document.getElementById('nav-tests').classList.toggle('active', tab === 'tests');
  if (tab === 'tests') renderTests();
}

// ── Escape helper ──
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
renderBooks();
</script>
</body>
</html>
