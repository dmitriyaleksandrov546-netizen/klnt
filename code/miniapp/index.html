<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --radius: 16px;
    --nav-h: 64px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    font-size: 15px;
    overflow: hidden;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100dvh; }

  .screen { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
  .screen::-webkit-scrollbar { display: none; }

  /* ── Bottom Nav ── */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,.08);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0);
    z-index: 100;
  }
  nav button {
    flex: 1; border: none; background: none; cursor: pointer;
    color: var(--hint);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    font-size: 11px; font-weight: 500; transition: color .2s;
  }
  nav button.active { color: var(--btn); }
  nav button svg { width: 24px; height: 24px; }

  /* ── Page title ── */
  .page-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .page-header h1 { font-size: 22px; font-weight: 700; }
  .back-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--btn); flex-shrink: 0;
  }

  /* ── Book Card ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .book-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .book-author { font-size: 13px; color: var(--hint); margin-bottom: 14px; }

  .progress-row { margin-bottom: 8px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--hint); margin-bottom: 4px;
  }
  .progress-track {
    height: 6px; background: rgba(255,255,255,.1);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px; transition: width .6s ease;
  }
  .progress-fill.reading { background: var(--btn); }
  .progress-fill.tests   { background: #30d158; }

  .book-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; gap: 8px;
  }
  .source-link {
    font-size: 12px; color: var(--link);
    text-decoration: none; display: flex; align-items: center; gap: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%;
  }
  .source-link:hover { text-decoration: underline; }
  .chapters-btn {
    background: var(--btn); color: var(--btn-text);
    border: none; border-radius: 10px; padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; transition: opacity .15s;
  }
  .chapters-btn:active { opacity: .75; }

  /* ── Chapter list ── */
  .chapter-list { list-style: none; }
  .chapter-item {
    background: var(--bg2); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 8px;
    font-size: 15px;
    display: flex; align-items: center; gap: 12px;
  }
  .chapter-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(10,132,255,.2); color: var(--btn);
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Tests tab ── */
  .test-card {
    background: var(--bg2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .test-book-label {
    font-size: 12px; color: var(--hint); margin-bottom: 6px;
  }
  .test-question { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .test-options { display: flex; flex-direction: column; gap: 8px; }
  .test-opt {
    background: rgba(255,255,255,.06); border: 1.5px solid transparent;
    border-radius: 10px; padding: 10px 14px; cursor: pointer;
    font-size: 14px; transition: border-color .15s, background .15s;
    text-align: left;
  }
  .test-opt:hover { background: rgba(255,255,255,.1); }
  .test-opt.correct { border-color: #30d158; background: rgba(48,209,88,.12); }
  .test-opt.wrong   { border-color: #ff453a; background: rgba(255,69,58,.12); }

  .empty-state {
    text-align: center; color: var(--hint);
    padding: 60px 20px; font-size: 15px; line-height: 1.6;
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

  /* hidden util */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- ══ ЭКРАН: Список книг ══ -->
  <div id="screen-books" class="screen">
    <div class="page-header"><h1>📚 Мои книги</h1></div>
    <div id="books-list"></div>
  </div>

  <!-- ══ ЭКРАН: Главы книги ══ -->
  <div id="screen-chapters" class="screen hidden">
    <div class="page-header">
      <button class="back-btn" onclick="showBooks()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 id="chapters-title">Главы</h1>
    </div>
    <ul id="chapters-list" class="chapter-list"></ul>
  </div>

  <!-- ══ ЭКРАН: Тесты ══ -->
  <div id="screen-tests" class="screen hidden">
    <div class="page-header"><h1>✅ Тесты</h1></div>
    <div id="tests-list"></div>
  </div>

  <!-- ══ Навигация ══ -->
  <nav>
    <button id="nav-books" class="active" onclick="switchTab('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Книги
    </button>
    <button id="nav-tests" onclick="switchTab('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Тесты
    </button>
  </nav>

</div>

<script>
// ── Mock data ──────────────────────────────────────────────────────────────
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Введение: Удивительная сила крошечных изменений","Глава 1. Удивительная сила атомных привычек","Глава 2. Как привычки формируют вашу личность","Глава 3. Как создать лучшие привычки (4 шага)","Глава 4. Человек, который не верил в судьбу","Глава 5. Лучший способ начать новую привычку","Глава 6. Мотивация переоценена; среда часто важнее"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=TA7Q_ZsueoYC",
    chapters: ["Глава 1. Действующие лица","Глава 2. Внимание и усилие","Глава 3. Ленивый контролёр","Глава 4. Ассоциативная машина","Глава 5. Когнитивная лёгкость","Глава 6. Нормы, сюрпризы и причины"]
  },
  {
    id: 3,
    title: "Поток",
    author: "Михай Чиксентмихайи",
    reading_progress: 5,
    test_progress: 0,
    url: "https://books.google.com/books?id=flow_csikszentmihalyi",
    chapters: ["Глава 1. Счастье вновь обретённое","Глава 2. Анатомия сознания","Глава 3. Радость и качество жизни","Глава 4. Условия потока","Глава 5. Тело в потоке"]
  }
];

const tests = [
  {
    book_id: 1,
    question: "Что Джеймс Клир называет «атомной привычкой»?",
    options: [
      "Привычка, связанная с ядерной энергетикой",
      "Небольшое изменение, дающее поразительные результаты",
      "Привычка, выполняемая каждый день",
      "Привычка, закреплённая на молекулярном уровне"
    ],
    correct: 1
  },
  {
    book_id: 1,
    question: "Сколько законов поведения выделяет Клир для создания хорошей привычки?",
    options: ["2", "3", "4", "5"],
    correct: 2
  },
  {
    book_id: 2,
    question: "Как Канеман называет быструю, автоматическую систему мышления?",
    options: ["Система 0", "Система 1", "Система 2", "Система 3"],
    correct: 1
  }
];

// ── State ──────────────────────────────────────────────────────────────────
let currentTab = 'books';
let answeredTests = {}; // { testIndex: chosenOptionIndex }

// ── Telegram Web App init ──────────────────────────────────────────────────
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Render: Books ──────────────────────────────────────────────────────────
function renderBooks() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">📖</div>Книг пока нет.<br>Добавь первую через бота.</div>`;
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${esc(b.title)}</div>
      <div class="book-author">${esc(b.author)}</div>

      <div class="progress-row">
        <div class="progress-label"><span>📖 Чтение</span><span>${b.reading_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill reading" style="width:${b.reading_progress}%"></div></div>
      </div>

      <div class="progress-row">
        <div class="progress-label"><span>✅ Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill tests" style="width:${b.test_progress}%"></div></div>
      </div>

      <div class="book-footer">
        ${b.url ? `<a class="source-link" href="${esc(b.url)}" target="_blank">🔗 Источник</a>` : '<span></span>'}
        <button class="chapters-btn" onclick="showChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── Render: Chapters ───────────────────────────────────────────────────────
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  document.getElementById('chapters-title').textContent = book.title;
  const list = document.getElementById('chapters-list');
  list.innerHTML = book.chapters.map((ch, i) => `
    <li class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <span>${esc(ch)}</span>
    </li>
  `).join('');
  setScreen('chapters');
}

function showBooks() {
  setScreen('books');
}

// ── Render: Tests ──────────────────────────────────────────────────────────
function renderTests() {
  const container = document.getElementById('tests-list');
  if (!tests.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🧠</div>Тестов пока нет.<br>Пройди несколько глав.</div>`;
    return;
  }
  container.innerHTML = tests.map((t, idx) => {
    const book = books.find(b => b.id === t.book_id);
    const answered = answeredTests[idx];
    return `
      <div class="test-card">
        <div class="test-book-label">${book ? esc(book.title) : ''}</div>
        <div class="test-question">${esc(t.question)}</div>
        <div class="test-options">
          ${t.options.map((opt, oi) => {
            let cls = 'test-opt';
            if (answered !== undefined) {
              if (oi === t.correct) cls += ' correct';
              else if (oi === answered && oi !== t.correct) cls += ' wrong';
            }
            const disabled = answered !== undefined ? 'disabled' : '';
            return `<button class="${cls}" onclick="answerTest(${idx},${oi})" ${disabled}>${esc(opt)}</button>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function answerTest(testIdx, optionIdx) {
  if (answeredTests[testIdx] !== undefined) return;
  answeredTests[testIdx] = optionIdx;
  renderTests();
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('nav-books').classList.toggle('active', tab === 'books');
  document.getElementById('nav-tests').classList.toggle('active', tab === 'tests');
  setScreen(tab);
  if (tab === 'tests') renderTests();
}

function setScreen(name) {
  ['books','chapters','tests'].forEach(s => {
    document.getElementById('screen-' + s).classList.toggle('hidden', s !== name);
  });
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
renderBooks();
</script>
</body>
</html>
