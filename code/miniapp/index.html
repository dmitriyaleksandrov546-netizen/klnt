<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 72px;
  }

  /* ── Tabs ── */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64px;
    background: var(--bg2);
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 11px;
    cursor: pointer;
    transition: color .2s;
  }
  .tab-btn.active { color: var(--btn); }
  .tab-btn svg { width: 24px; height: 24px; }

  /* ── Pages ── */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ── Header ── */
  .page-header {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  /* ── Book card ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .book-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 12px;
  }

  /* Progress bars */
  .progress-row {
    margin-bottom: 8px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 4px;
  }
  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-fill.reading { background: var(--btn); }
  .progress-fill.tests   { background: #30d158; }

  /* Book footer */
  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }
  .book-link {
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
  }
  .book-link:hover { text-decoration: underline; }
  .chapters-btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .chapters-btn:active { opacity: .7; }

  /* ── Chapters view ── */
  .chapters-view { display: none; }
  .chapters-view.active { display: block; }
  .books-list.hidden { display: none; }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--btn);
    font-size: 16px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
  }
  .back-btn svg { width: 20px; height: 20px; }

  .chapters-book-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .chapters-book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 16px;
  }

  .chapter-item {
    background: var(--bg2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chapter-num {
    font-size: 13px;
    color: var(--hint);
    min-width: 24px;
  }

  /* ── Tests tab ── */
  .test-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .test-book {
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 4px;
  }
  .test-question {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .test-options { display: flex; flex-direction: column; gap: 8px; }
  .test-option {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    transition: background .15s;
  }
  .test-option:active { background: rgba(255,255,255,0.12); }
  .test-option.correct { background: rgba(48,209,88,0.2); border-color: #30d158; }
  .test-option.wrong   { background: rgba(255,69,58,0.2);  border-color: #ff453a; }

  .empty-state {
    text-align: center;
    color: var(--hint);
    margin-top: 60px;
    font-size: 15px;
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- BOOKS PAGE -->
<div id="page-books" class="page active">
  <div class="page-header">📚 Мои книги</div>

  <div class="books-list" id="books-list"></div>

  <div class="chapters-view" id="chapters-view">
    <button class="back-btn" onclick="showBooksList()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Назад
    </button>
    <div class="chapters-book-title" id="chap-title"></div>
    <div class="chapters-book-author" id="chap-author"></div>
    <div id="chap-list"></div>
  </div>
</div>

<!-- TESTS PAGE -->
<div id="page-tests" class="page">
  <div class="page-header">✏️ Тесты</div>
  <div id="tests-list"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="tab-btn" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
// ── Mock data ──────────────────────────────────────────────────────────────
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Введение", "Глава 1. Удивительная сила крошечных улучшений", "Глава 2. Как привычки формируют идентичность", "Глава 3. Как создать лучшие привычки за 4 шага", "Глава 4. Человек, который не верил в себя", "Глава 5. Лучший способ начать новую привычку", "Глава 6. Мотивация переоценена", "Глава 7. Тайная сила семьи и друзей", "Глава 8. Как сделать привычки неотвратимыми"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=ZuKTvERuPG8C",
    chapters: ["Предисловие", "Глава 1. Персонажи истории", "Глава 2. Внимание и усилие", "Глава 3. Ленивый контроллер", "Глава 4. Машина ассоциаций", "Глава 5. Когнитивная лёгкость"]
  },
  {
    id: 3,
    title: "Чёрный лебедь",
    author: "Нассим Талеб",
    reading_progress: 0,
    test_progress: 0,
    url: "https://books.google.com/books?id=GSBcV9CWfXQC",
    chapters: ["Пролог", "Глава 1. Ученичество чёрного лебедя", "Глава 2. Йевгения Красноваи", "Глава 3. Спекулятивная история", "Глава 4. Тысяча и один день"]
  }
];

const tests = [
  {
    book_id: 1,
    question: "Что автор называет «атомными привычками»?",
    options: ["Радиоактивные изменения в поведении", "Крошечные улучшения на 1% каждый день", "Мгновенные результаты", "Сложные ритуалы"],
    correct: 1
  },
  {
    book_id: 1,
    question: "Что такое «Система 1» по Канеману?",
    options: ["Медленное, аналитическое мышление", "Быстрое, автоматическое мышление", "Логические рассуждения", "Сознательные решения"],
    correct: 1
  },
  {
    book_id: 2,
    question: "Какое из событий Талеб называет «Чёрным лебедем»?",
    options: ["Предсказуемое событие", "Редкое непредсказуемое событие с огромным эффектом", "Ежедневная рутина", "Постепенное изменение"],
    correct: 1
  }
];

// ── Telegram Web App init ──────────────────────────────────────────────────
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'books') showBooksList();
}

// ── Books rendering ────────────────────────────────────────────────────────
function renderBooks() {
  const container = document.getElementById('books-list');
  container.innerHTML = '';

  if (!books.length) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📖</div>Нет добавленных книг</div>';
    return;
  }

  books.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-title">${escHtml(book.title)}</div>
      <div class="book-author">${escHtml(book.author)}</div>

      <div class="progress-row">
        <div class="progress-label">
          <span>📖 Прочитано</span>
          <span>${book.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill reading" style="width:${book.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-row">
        <div class="progress-label">
          <span>✏️ Тесты пройдены</span>
          <span>${book.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${book.test_progress}%"></div>
        </div>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${escHtml(book.url)}" target="_blank">🔗 Источник</a>
        <button class="chapters-btn" onclick="showChapters(${book.id})">Главы →</button>
      </div>
    `;
    container.appendChild(card);
  });
}

// ── Chapters view ──────────────────────────────────────────────────────────
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('books-list').classList.add('hidden');
  const view = document.getElementById('chapters-view');
  view.classList.add('active');

  document.getElementById('chap-title').textContent = book.title;
  document.getElementById('chap-author').textContent = book.author;

  const list = document.getElementById('chap-list');
  list.innerHTML = '';
  book.chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    item.innerHTML = `<span class="chapter-num">${i + 1}</span><span>${escHtml(ch)}</span>`;
    list.appendChild(item);
  });

  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(showBooksList);
  }
}

function showBooksList() {
  document.getElementById('books-list').classList.remove('hidden');
  document.getElementById('chapters-view').classList.remove('active');
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.BackButton.hide();
  }
}

// ── Tests rendering ────────────────────────────────────────────────────────
function renderTests() {
  const container = document.getElementById('tests-list');
  container.innerHTML = '';

  if (!tests.length) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">✅</div>Тестов пока нет</div>';
    return;
  }

  tests.forEach((test, ti) => {
    const book = books.find(b => b.id === test.book_id);
    const card = document.createElement('div');
    card.className = 'test-card';
    card.innerHTML = `
      <div class="test-book">${book ? escHtml(book.title) : ''}</div>
      <div class="test-question">${escHtml(test.question)}</div>
      <div class="test-options" id="opts-${ti}">
        ${test.options.map((opt, oi) =>
          `<button class="test-option" onclick="answerTest(${ti},${oi})">${escHtml(opt)}</button>`
        ).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}

function answerTest(testIdx, optionIdx) {
  const test = tests[testIdx];
  const opts = document.querySelectorAll(`#opts-${testIdx} .test-option`);
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === test.correct) btn.classList.add('correct');
    else if (i === optionIdx && optionIdx !== test.correct) btn.classList.add('wrong');
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
renderBooks();
renderTests();
</script>
</body>
</html>
