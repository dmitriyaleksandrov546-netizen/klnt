<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg-secondary: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --accent: var(--tg-theme-button-color, #0a84ff);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --destructive: #ff453a;
    --separator: rgba(255,255,255,0.08);
    --radius: 14px;
    --tab-height: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 16px 16px 0;
    border-bottom: 1px solid var(--separator);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    padding-bottom: 12px;
  }

  /* ── TABS ── */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-height);
    background: var(--bg-secondary);
    border-top: 1px solid var(--separator);
    display: flex;
    z-index: 20;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border: none;
    background: none;
    color: var(--hint);
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    padding: 6px 0;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn svg { width: 24px; height: 24px; }

  /* ── CONTENT ── */
  .screen { display: none; padding: 12px 16px calc(var(--tab-height) + 16px + env(safe-area-inset-bottom, 0px)); }
  .screen.active { display: block; }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    active: scale(0.98);
  }
  .book-card:active { transform: scale(0.98); opacity: 0.85; }

  .book-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 14px;
  }

  /* Progress */
  .progress-group { margin-bottom: 12px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 5px;
  }
  .progress-track {
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 0.5s ease;
  }
  .progress-fill.reading { background: var(--accent); }
  .progress-fill.tests   { background: #30d158; }

  /* Card footer */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--separator);
  }
  .book-link {
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .book-link:active { opacity: 0.6; }
  .chapters-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .chapters-btn:active { opacity: 0.6; }

  /* ── CHAPTERS VIEW ── */
  #chapters-view {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 30;
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  #chapters-view.open { display: block; }

  .chapters-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--separator);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 5;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0;
  }
  .back-btn:active { opacity: 0.6; }
  .chapters-title {
    font-size: 17px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chapters-list {
    padding: 12px 16px;
  }
  .chapter-item {
    display: flex;
    align-items: center;
    padding: 13px 0;
    border-bottom: 1px solid var(--separator);
    gap: 12px;
  }
  .chapter-item:last-child { border-bottom: none; }
  .chapter-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--hint);
    flex-shrink: 0;
  }
  .chapter-name {
    font-size: 15px;
    flex: 1;
  }
  .chapter-done {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #30d158;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── TESTS SCREEN ── */
  .tests-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 14px;
    color: var(--hint);
    text-align: center;
  }
  .tests-empty svg { opacity: 0.35; }
  .tests-empty p { font-size: 15px; line-height: 1.5; }

  .test-card {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .test-book-name {
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .test-question {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .test-options { display: flex; flex-direction: column; gap: 8px; }
  .test-option {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: var(--text);
  }
  .test-option:active { opacity: 0.7; }
  .test-option.correct { border-color: #30d158; background: rgba(48,209,88,0.12); }
  .test-option.wrong   { border-color: var(--destructive); background: rgba(255,69,58,0.12); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 20px 0 10px;
  }
  .section-label:first-child { margin-top: 8px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>📚 BookBot</h1>
</div>

<!-- SCREEN: BOOKS -->
<div id="screen-books" class="screen active">
  <div class="section-label">Мои книги</div>
  <div id="books-list"></div>
</div>

<!-- SCREEN: TESTS -->
<div id="screen-tests" class="screen">
  <div id="tests-content"></div>
</div>

<!-- CHAPTERS OVERLAY -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" onclick="closeChapters()">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Назад
    </button>
    <span class="chapters-title" id="chapters-title"></span>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="2"/>
    </svg>
    Книги
  </button>
  <button class="tab-btn" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
// ── TELEGRAM SDK INIT ──
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── MOCK DATA ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: [
      "Введение: история про 1%",
      "Глава 1. Удивительная сила атомных привычек",
      "Глава 2. Как привычки формируют вашу идентичность",
      "Глава 3. Как создать хорошую привычку за 4 шага",
      "Глава 4. Человек, который не смотрит в телефон",
      "Глава 5. Лучший способ начать новую привычку",
      "Глава 6. Мотивация переоценена",
      "Глава 7. Секрет самоконтроля",
      "Глава 8. Как сделать привычку привлекательной",
    ],
    chapters_done: [0, 1, 2, 3, 4]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=SHpFx2X6HkgC",
    chapters: [
      "Часть I. Два вида мышления",
      "Глава 1. Персонажи истории",
      "Глава 2. Внимание и усилие",
      "Глава 3. Ленивый контролёр",
      "Глава 4. Ассоциативная машина",
      "Глава 5. Когнитивная лёгкость",
      "Глава 6. Нормы, сюрпризы и причины",
    ],
    chapters_done: [0]
  },
  {
    id: 3,
    title: "Сапиенс",
    author: "Юваль Ной Харари",
    reading_progress: 5,
    test_progress: 0,
    url: "https://books.google.com/books?id=1EiJAwAAQBAJ",
    chapters: [
      "Часть 1. Когнитивная революция",
      "Часть 2. Сельскохозяйственная революция",
      "Часть 3. Объединение человечества",
      "Часть 4. Научная революция",
    ],
    chapters_done: []
  }
];

const tests = [
  {
    id: 1,
    book_id: 1,
    question: "Какой процент улучшений каждый день приводит к тому, что за год вы станете в 37 раз лучше?",
    options: ["0.5%", "1%", "5%", "10%"],
    correct: 1
  },
  {
    id: 2,
    book_id: 1,
    question: "Что лежит в основе системы четырёх законов изменения поведения?",
    options: [
      "Сила воли и мотивация",
      "Сигнал, Желание, Реакция, Награда",
      "Цели и планы",
      "Социальное давление"
    ],
    correct: 1
  },
  {
    id: 3,
    book_id: 2,
    question: "Как Канеман называет быструю, интуитивную систему мышления?",
    options: ["Система 0", "Система 1", "Система 2", "Система 3"],
    correct: 1
  }
];

// ── STATE ──
const answered = {};

// ── RENDER BOOKS ──
function renderBooks() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = `
      <div class="tests-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <p>Книг пока нет.<br>Добавь первую через бот.</p>
      </div>`;
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card" onclick="openChapters(${b.id})">
      <div class="book-title">${escHtml(b.title)}</div>
      <div class="book-author">${escHtml(b.author)}</div>
      <div class="progress-group">
        <div class="progress-label">
          <span>Чтение</span>
          <span>${b.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill reading" style="width:${b.reading_progress}%"></div>
        </div>
      </div>
      <div class="progress-group">
        <div class="progress-label">
          <span>Тесты</span>
          <span>${b.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${b.test_progress}%"></div>
        </div>
      </div>
      <div class="card-footer">
        <a class="book-link" href="${escHtml(b.url)}" target="_blank" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <polyline points="15 3 21 3 21 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Источник
        </a>
        <button class="chapters-btn" onclick="event.stopPropagation(); openChapters(${b.id})">
          Главы
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
}

// ── CHAPTERS ──
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-title').textContent = book.title;

  const list = document.getElementById('chapters-list');
  list.innerHTML = book.chapters.map((ch, i) => {
    const done = book.chapters_done.includes(i);
    return `
      <div class="chapter-item">
        <div class="chapter-num">${i + 1}</div>
        <div class="chapter-name">${escHtml(ch)}</div>
        ${done ? `<div class="chapter-done">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('chapters-view').classList.add('open');
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(closeChapters);
  }
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('open');
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.BackButton.hide();
  }
}

// ── RENDER TESTS ──
function renderTests() {
  const container = document.getElementById('tests-content');
  if (!tests.length) {
    container.innerHTML = `
      <div class="tests-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>Тестов пока нет.<br>Они появятся после добавления книги.</p>
      </div>`;
    return;
  }

  container.innerHTML = '<div class="section-label" style="padding:8px 0 4px">Вопросы</div>' +
    tests.map(t => {
      const book = books.find(b => b.id === t.book_id);
      return `
        <div class="test-card" id="test-${t.id}">
          <div class="test-book-name">${book ? escHtml(book.title) : ''}</div>
          <div class="test-question">${escHtml(t.question)}</div>
          <div class="test-options">
            ${t.options.map((opt, i) => `
              <button class="test-option" onclick="answerTest(${t.id}, ${i}, ${t.correct})">
                ${escHtml(opt)}
              </button>`).join('')}
          </div>
        </div>`;
    }).join('');
}

function answerTest(testId, chosen, correct) {
  if (answered[testId]) return;
  answered[testId] = true;

  const card = document.getElementById(`test-${testId}`);
  const opts = card.querySelectorAll('.test-option');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });
}

// ── TAB SWITCH ──
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ── UTIL ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
renderBooks();
renderTests();
</script>
</body>
</html>
