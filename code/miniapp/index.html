<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg-secondary: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #5e9fe0);
    --button: var(--tg-theme-button-color, #5e9fe0);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
    --accent: #5e9fe0;
    --accent2: #34c759;
    --card-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --radius: 14px;
    --tab-height: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 12px 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    padding-bottom: 12px;
  }
  .header h1 span { color: var(--accent); }

  /* ── Tabs ── */
  .tabs-nav {
    display: flex;
    gap: 0;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
    letter-spacing: 0.1px;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Screens ── */
  .screen {
    display: none;
    padding: 16px 16px calc(var(--tab-height) + 20px);
    animation: fadeIn .18s ease;
  }
  .screen.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── Book Card ── */
  .book-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .book-card:active { transform: scale(0.985); }

  .book-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .book-meta { flex: 1; min-width: 0; }
  .book-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 3px;
    letter-spacing: -0.2px;
  }
  .book-author {
    font-size: 13px;
    color: var(--hint);
  }

  .book-link {
    font-size: 12px;
    color: var(--link);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 4px 8px;
    background: rgba(94,159,224,0.12);
    border-radius: 8px;
    transition: background .15s;
  }
  .book-link:active { background: rgba(94,159,224,0.25); }

  /* ── Progress bars ── */
  .progress-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
  .progress-row { display: flex; align-items: center; gap: 8px; }
  .progress-label {
    font-size: 11px;
    color: var(--hint);
    width: 64px;
    flex-shrink: 0;
    line-height: 1;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .progress-fill.reading { background: var(--accent); }
  .progress-fill.testing { background: var(--accent2); }
  .progress-pct {
    font-size: 11px;
    color: var(--hint);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Chapters button ── */
  .btn-chapters {
    width: 100%;
    background: rgba(94,159,224,0.1);
    border: 1px solid rgba(94,159,224,0.2);
    color: var(--accent);
    border-radius: 10px;
    padding: 9px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
    letter-spacing: 0.1px;
  }
  .btn-chapters:active { background: rgba(94,159,224,0.22); }

  /* ── Chapters view ── */
  #screen-chapters {
    padding-top: 0;
  }
  .chapters-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 5;
  }
  .btn-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 15px;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .btn-back svg { width: 9px; height: 15px; }
  .chapters-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
    flex: 1;
    letter-spacing: -0.2px;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
    transition: background .12s;
  }
  .chapter-item:active { background: rgba(255,255,255,0.04); }
  .chapter-num {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(94,159,224,0.13);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .chapter-name {
    font-size: 15px;
    flex: 1;
  }
  .chapter-arrow {
    color: var(--hint);
    font-size: 18px;
    line-height: 1;
    opacity: 0.5;
  }

  /* ── Tests screen ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 4px 0 10px;
  }

  .test-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform .15s;
  }
  .test-card:active { transform: scale(0.985); }

  .test-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(52,199,89,0.13);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .test-info { flex: 1; min-width: 0; }
  .test-book-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .test-subtitle {
    font-size: 12px;
    color: var(--hint);
  }
  .test-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
    background: rgba(52,199,89,0.12);
    border-radius: 8px;
    padding: 3px 8px;
    white-space: nowrap;
  }
  .test-badge.zero {
    color: var(--hint);
    background: rgba(255,255,255,0.06);
  }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--hint);
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-chip {
    flex: 1;
    background: var(--card-bg);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .stat-value.blue { color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .stat-label {
    font-size: 10px;
    color: var(--hint);
    margin-top: 1px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
</style>
</head>
<body>

<!-- Header + tabs -->
<div class="header" id="main-header">
  <h1>📚 Book<span>Bot</span></h1>
  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('books')">Книги</button>
    <button class="tab-btn" onclick="switchTab('tests')">Тесты</button>
  </div>
</div>

<!-- Screen: Books -->
<div id="screen-books" class="screen active"></div>

<!-- Screen: Tests -->
<div id="screen-tests" class="screen"></div>

<!-- Screen: Chapters (overlay) -->
<div id="screen-chapters" class="screen" style="padding:0;">
  <div class="chapters-header">
    <button class="btn-back" onclick="closeChapters()">
      <svg viewBox="0 0 9 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 1L1.5 7.5L8 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Назад
    </button>
    <div class="chapters-title" id="chapters-book-title">Главы</div>
  </div>
  <div id="chapters-list"></div>
</div>

<script>
// ── Mock data ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Введение: невероятная сила малых шагов","1. Удивительная сила атомных привычек","2. Как привычки формируют вашу личность","3. Как создать лучшие привычки","4. Закон первый: сделайте это очевидным","5. Лучший способ начать новую привычку","6. Секрет самодисциплины","7. Как сделать привычки привлекательными","8. Роль семьи и друзей","9. Как найти и исправить причины плохих привычек","10. Закон второй: сделайте это простым","11. Двухминутное правило","Итоги: хорошие привычки делают будущее"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=bAuFAAAAQBAJ",
    chapters: ["Введение","Часть I: Две системы","Часть II: Эвристика и предубеждения","Часть III: Самоуверенность","Часть IV: Выбор","Часть V: Два «я»","Заключение"]
  },
  {
    id: 3,
    title: "Sapiens: Краткая история человечества",
    author: "Юваль Ной Харари",
    reading_progress: 85,
    test_progress: 70,
    url: "https://books.google.com/books?id=1EiJAwAAQBAJ",
    chapters: ["Предисловие","Ч.1: Когнитивная революция","Ч.2: Сельскохозяйственная революция","Ч.3: Объединение человечества","Ч.4: Научная революция","Эпилог: Животное, ставшее богом"]
  }
];

// ── State ──
let currentTab = 'books';
let previousTab = 'books';

// ── Init ──
window.Telegram?.WebApp?.ready();
window.Telegram?.WebApp?.expand();

renderBooks();
renderTests();

// ── Tab switch ──
function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'books') || (i === 1 && tab === 'tests'));
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('main-header').style.display = '';
}

// ── Render books ──
function renderBooks() {
  const avg_read = Math.round(books.reduce((s, b) => s + b.reading_progress, 0) / books.length);
  const avg_test = Math.round(books.reduce((s, b) => s + b.test_progress, 0) / books.length);

  let html = `
    <div class="stats-bar">
      <div class="stat-chip">
        <div class="stat-value blue">${books.length}</div>
        <div class="stat-label">книг</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value blue">${avg_read}%</div>
        <div class="stat-label">прочитано</div>
      </div>
      <div class="stat-chip">
        <div class="stat-value green">${avg_test}%</div>
        <div class="stat-label">тесты</div>
      </div>
    </div>
  `;

  books.forEach(book => {
    html += `
    <div class="book-card">
      <div class="book-header">
        <div class="book-meta">
          <div class="book-title">${book.title}</div>
          <div class="book-author">${book.author}</div>
        </div>
        <a class="book-link" href="${book.url}" target="_blank" onclick="event.stopPropagation()">
          🔗 Источник
        </a>
      </div>
      <div class="progress-group">
        <div class="progress-row">
          <div class="progress-label">Чтение</div>
          <div class="progress-bar"><div class="progress-fill reading" style="width:${book.reading_progress}%"></div></div>
          <div class="progress-pct">${book.reading_progress}%</div>
        </div>
        <div class="progress-row">
          <div class="progress-label">Тесты</div>
          <div class="progress-bar"><div class="progress-fill testing" style="width:${book.test_progress}%"></div></div>
          <div class="progress-pct">${book.test_progress}%</div>
        </div>
      </div>
      <button class="btn-chapters" onclick="openChapters(${book.id})">
        📋 Главы (${book.chapters.length})
      </button>
    </div>`;
  });

  document.getElementById('screen-books').innerHTML = html;
}

// ── Chapters ──
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  previousTab = currentTab;
  document.getElementById('chapters-book-title').textContent = book.title;

  let html = '';
  book.chapters.forEach((ch, i) => {
    html += `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${ch}</div>
      <div class="chapter-arrow">›</div>
    </div>`;
  });
  document.getElementById('chapters-list').innerHTML = html;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-chapters').classList.add('active');
  document.getElementById('main-header').style.display = 'none';
}

function closeChapters() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + previousTab).classList.add('active');
  document.getElementById('main-header').style.display = '';
}

// ── Render tests ──
function renderTests() {
  const withTests = books.filter(b => b.test_progress > 0);
  const noTests   = books.filter(b => b.test_progress === 0);

  let html = '';

  if (withTests.length) {
    html += `<div class="section-label">Активные тесты</div>`;
    withTests.forEach(book => {
      html += `
      <div class="test-card">
        <div class="test-icon">📝</div>
        <div class="test-info">
          <div class="test-book-title">${book.title}</div>
          <div class="test-subtitle">${book.author}</div>
        </div>
        <div class="test-badge">${book.test_progress}%</div>
      </div>`;
    });
  }

  if (noTests.length) {
    html += `<div class="section-label" style="margin-top:${withTests.length ? '16px' : '4px'}">Не начаты</div>`;
    noTests.forEach(book => {
      html += `
      <div class="test-card">
        <div class="test-icon" style="background:rgba(255,255,255,0.06)">📖</div>
        <div class="test-info">
          <div class="test-book-title">${book.title}</div>
          <div class="test-subtitle">${book.author}</div>
        </div>
        <div class="test-badge zero">0%</div>
      </div>`;
    });
  }

  if (!books.length) {
    html = `<div class="empty-state"><div class="emoji">🎯</div><p>Тестов пока нет.<br>Добавь книгу — и начни проверять себя.</p></div>`;
  }

  document.getElementById('screen-tests').innerHTML = html;
}
</script>
</body>
</html>
