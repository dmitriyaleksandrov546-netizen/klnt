<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --accent: #0a84ff;
    --green: #30d158;
    --orange: #ff9f0a;
    --radius: 14px;
    --tab-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 16px 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .header span { color: var(--hint); font-size: 13px; }

  /* ── TABS ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px;
    background: none; border: none; color: var(--hint);
    font-size: 10px; font-weight: 500; cursor: pointer;
    transition: color 0.18s;
  }
  .tab-btn svg { width: 24px; height: 24px; }
  .tab-btn.active { color: var(--accent); }

  /* ── SCREENS ── */
  .screen { display: none; padding: 12px 16px; padding-bottom: calc(var(--tab-h) + 12px); }
  .screen.active { display: block; }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .book-card:active { opacity: 0.7; }

  .book-title {
    font-size: 16px; font-weight: 600;
    letter-spacing: -0.3px; margin-bottom: 2px;
  }
  .book-author { color: var(--hint); font-size: 13px; margin-bottom: 14px; }

  .progress-row { margin-bottom: 9px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--hint); margin-bottom: 4px;
  }
  .progress-label b { color: var(--text); }
  .progress-track {
    height: 5px; background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-fill.read { background: var(--accent); }
  .progress-fill.test { background: var(--green); }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .source-link {
    font-size: 12px; color: var(--link);
    text-decoration: none; display: flex; align-items: center; gap: 4px;
  }
  .source-link svg { width: 12px; height: 12px; flex-shrink: 0; }
  .chapters-btn {
    background: var(--btn); color: var(--btn-text);
    border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .chapters-btn:active { opacity: 0.75; }

  /* ── CHAPTERS VIEW ── */
  #chapters-view {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 50; overflow-y: auto;
  }
  #chapters-view.open { display: block; }
  .chapters-header {
    position: sticky; top: 0; background: var(--bg);
    padding: 12px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 10px;
  }
  .back-btn {
    background: var(--bg2); border: none; color: var(--text);
    border-radius: 8px; padding: 7px 12px; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    transition: opacity 0.15s;
  }
  .back-btn:active { opacity: 0.7; }
  .chapters-title { font-size: 16px; font-weight: 700; flex: 1; }
  .chapter-item {
    display: flex; align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .chapter-num {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--bg2); display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--hint);
    flex-shrink: 0; margin-right: 12px;
  }
  .chapter-name { font-size: 15px; }

  /* ── TESTS SCREEN ── */
  .section-label {
    font-size: 12px; font-weight: 600; color: var(--hint);
    text-transform: uppercase; letter-spacing: 0.6px;
    margin-bottom: 8px; margin-top: 4px;
  }
  .test-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .test-card:active { opacity: 0.7; }
  .test-book-name { font-size: 13px; color: var(--hint); margin-bottom: 4px; }
  .test-question { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
  .test-meta { display: flex; gap: 8px; }
  .test-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 6px; background: rgba(255,255,255,0.07); color: var(--hint);
  }
  .test-badge.new { background: rgba(10,132,255,0.15); color: var(--accent); }
  .test-badge.done { background: rgba(48,209,88,0.15); color: var(--green); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--hint); font-size: 15px; line-height: 1.5;
  }
  .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>📚 BookBot</h1>
  <span id="header-sub">Мои книги</span>
</div>

<!-- SCREEN: Книги -->
<div class="screen active" id="screen-books">
  <div id="books-list"></div>
</div>

<!-- SCREEN: Тесты -->
<div class="screen" id="screen-tests">
  <div class="section-label">Активные</div>
  <div id="tests-list"></div>
</div>

<!-- CHAPTERS OVERLAY -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" onclick="closeChapters()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Назад
    </button>
    <div class="chapters-title" id="chapters-title"></div>
  </div>
  <div id="chapters-list"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14zm2.5-1H18v-1H6.5a.5.5 0 0 0 0 1z"/></svg>
    Книги
  </button>
  <button class="tab-btn" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zM5 3H3v16a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V3h-2v16H5V3z"/></svg>
    Тесты
  </button>
</nav>

<script>
// ── Telegram Web App init ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Mock data ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Введение. Удивительная сила атомных привычек", "Глава 1. Удивительная сила маленьких изменений", "Глава 2. Как ваши привычки формируют вашу идентичность", "Глава 3. Как построить лучшие привычки за 4 шага", "Глава 4. Человек, который не видит леса за деревьями", "Глава 5. Лучший способ запустить новую привычку", "Глава 6. Мотивация переоценена", "Глава 7. Секрет самоконтроля"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=SHnBnAAACAAJ",
    chapters: ["Введение", "Глава 1. Действующие лица", "Глава 2. Внимание и усилие", "Глава 3. Ленивый контролёр", "Глава 4. Ассоциативная машина", "Глава 5. Когнитивная лёгкость"]
  },
  {
    id: 3,
    title: "Sapiens: Краткая история человечества",
    author: "Юваль Ной Харари",
    reading_progress: 85,
    test_progress: 75,
    url: "https://books.google.com/books?id=1EiJAwAAQBAJ",
    chapters: ["Часть 1. Когнитивная революция", "Часть 2. Сельскохозяйственная революция", "Часть 3. Объединение человечества", "Часть 4. Научная революция"]
  }
];

const tests = [
  { id: 1, book_id: 1, question: "Как называется концепция 1% улучшений каждый день?", status: "new" },
  { id: 2, book_id: 1, question: "Что такое «стопинг-поинт» по Клиру?", status: "new" },
  { id: 3, book_id: 2, question: "Как Канеман называет быстрое мышление?", status: "done" },
  { id: 4, book_id: 3, question: "Какая революция произошла ~70 000 лет назад?", status: "new" },
];

// ── Render books ──
function renderBooks() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z"/></svg>
      <div>Книг пока нет.<br>Добавь через бота 👇</div>
    </div>`;
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>

      <div class="progress-row">
        <div class="progress-label"><span>Чтение</span><b>${b.reading_progress}%</b></div>
        <div class="progress-track"><div class="progress-fill read" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-row">
        <div class="progress-label"><span>Тесты</span><b>${b.test_progress}%</b></div>
        <div class="progress-track"><div class="progress-fill test" style="width:${b.test_progress}%"></div></div>
      </div>

      <div class="card-footer">
        <a class="source-link" href="${b.url}" target="_blank" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Источник
        </a>
        <button class="chapters-btn" onclick="openChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── Render tests ──
function renderTests() {
  const container = document.getElementById('tests-list');
  if (!tests.length) {
    container.innerHTML = `<div class="empty">Тестов пока нет</div>`;
    return;
  }
  container.innerHTML = tests.map(t => {
    const book = books.find(b => b.id === t.book_id);
    const statusLabel = t.status === 'done' ? 'Пройден' : 'Новый';
    const statusClass = t.status === 'done' ? 'done' : 'new';
    return `
    <div class="test-card">
      <div class="test-book-name">${book ? book.title : '—'}</div>
      <div class="test-question">${t.question}</div>
      <div class="test-meta">
        <span class="test-badge ${statusClass}">${statusLabel}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Chapters ──
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  document.getElementById('chapters-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-name">${ch}</div>
    </div>
  `).join('');
  document.getElementById('chapters-view').classList.add('open');
  if (tg) tg.BackButton.show();
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('open');
  if (tg) tg.BackButton.hide();
}

if (tg) {
  tg.BackButton.onClick(() => closeChapters());
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  const labels = { books: 'Мои книги', tests: 'Тесты' };
  document.getElementById('header-sub').textContent = labels[name] || '';
}

// ── Init ──
renderBooks();
renderTests();
</script>
</body>
</html>
