<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #3478f6);
    --btn: var(--tg-theme-button-color, #3478f6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --divider: rgba(255,255,255,0.08);
    --radius: 14px;
    --tab-h: 60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; min-height: calc(100vh - var(--tab-h)); padding-bottom: 8px; }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center; gap: 10px;
  }
  .header h1 { font-size: 20px; font-weight: 700; flex: 1; }
  .back-btn {
    display: none; align-items: center; gap: 4px;
    background: none; border: none; color: var(--link);
    font-size: 16px; cursor: pointer; padding: 2px 0;
  }
  .back-btn.visible { display: flex; }
  .back-btn svg { width: 10px; height: 16px; }

  /* ── SCROLL AREA ── */
  .scroll-area { flex: 1; overflow-y: auto; padding: 12px 16px; }

  /* ── BOOK CARD ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .book-card:active { opacity: 0.7; }

  .book-title { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
  .book-author { font-size: 13px; color: var(--hint); margin-bottom: 14px; }

  .progress-row { margin-bottom: 8px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--hint); margin-bottom: 4px;
  }
  .progress-track {
    height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px; transition: width 0.6s ease;
  }
  .progress-fill.reading { background: var(--btn); }
  .progress-fill.tests { background: #34c759; }

  .book-footer {
    margin-top: 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .book-link {
    font-size: 13px; color: var(--link); text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
  }
  .chapters-btn {
    flex-shrink: 0;
    background: var(--btn); color: var(--btn-text);
    border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  .chapters-btn:active { opacity: 0.75; }

  /* ── CHAPTERS SCREEN ── */
  #screen-chapters .book-meta {
    padding: 12px 16px 4px;
    border-bottom: 1px solid var(--divider);
  }
  #screen-chapters .book-meta .bk-title { font-size: 16px; font-weight: 600; }
  #screen-chapters .book-meta .bk-author { font-size: 13px; color: var(--hint); margin-top: 2px; }

  .chapter-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--divider);
  }
  .ch-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--btn); color: var(--btn-text);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .ch-name { font-size: 15px; }

  /* ── TESTS SCREEN ── */
  .test-card {
    background: var(--bg2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
  }
  .test-book { font-size: 12px; color: var(--link); margin-bottom: 6px; font-weight: 600; }
  .test-question { font-size: 15px; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }
  .test-options { display: flex; flex-direction: column; gap: 8px; }
  .test-option {
    background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 10px 14px; font-size: 14px; cursor: pointer;
    border: 1.5px solid transparent; transition: all 0.2s;
  }
  .test-option:active { opacity: 0.7; }
  .test-option.correct { background: rgba(52,199,89,0.15); border-color: #34c759; color: #34c759; }
  .test-option.wrong { background: rgba(255,59,48,0.12); border-color: #ff3b30; color: #ff3b30; }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--hint); font-size: 15px; line-height: 1.6;
  }
  .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  /* ── BOTTOM TABS ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--bg2);
    border-top: 1px solid var(--divider);
    display: flex; z-index: 100;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    color: var(--hint); font-size: 11px; font-weight: 500;
    transition: color 0.2s;
  }
  .tab-item.active { color: var(--btn); }
  .tab-item svg { width: 24px; height: 24px; }
</style>
</head>
<body>

<!-- ── BOOKS SCREEN ── -->
<div id="screen-books" class="screen active">
  <div class="header">
    <h1>📚 Мои книги</h1>
  </div>
  <div class="scroll-area" id="books-list"></div>
</div>

<!-- ── CHAPTERS SCREEN ── -->
<div id="screen-chapters" class="screen">
  <div class="header">
    <button class="back-btn visible" id="back-from-chapters" onclick="showBooks()">
      <svg viewBox="0 0 10 16" fill="none"><path d="M9 1L1.5 8L9 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Книги
    </button>
    <h1 id="chapters-title">Главы</h1>
  </div>
  <div class="book-meta" id="chapters-meta"></div>
  <div class="scroll-area" id="chapters-list"></div>
</div>

<!-- ── TESTS SCREEN ── -->
<div id="screen-tests" class="screen">
  <div class="header">
    <h1>🧠 Тесты</h1>
  </div>
  <div class="scroll-area" id="tests-list"></div>
</div>

<!-- ── TAB BAR ── -->
<div class="tab-bar">
  <button class="tab-item active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="tab-item" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    Тесты
  </button>
</div>

<script>
// ── TELEGRAM SDK INIT ──
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── MOCK DATA ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила крошечных улучшений","Глава 2. Как ваши привычки формируют вашу идентичность","Глава 3. Как создать лучшие привычки за 4 шага","Глава 4. Человек, который не верил в судьбу","Глава 5. Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=oV1tXT3HigoC",
    chapters: ["Глава 1. Действующие лица","Глава 2. Внимание и усилие","Глава 3. Ленивый контролёр","Глава 4. Ассоциативная машина","Глава 5. Когнитивная лёгкость","Глава 6. Нормы, сюрпризы и причины","Глава 7. Машина для поспешных выводов","Глава 8. Откуда берутся суждения"]
  },
  {
    id: 3,
    title: "Sapiens. Краткая история человечества",
    author: "Юваль Ной Харари",
    reading_progress: 85,
    test_progress: 70,
    url: "https://books.google.com/books?id=FmyBAwAAQBAJ",
    chapters: ["Глава 1. Животное, не заслуживающее внимания","Глава 2. Древо познания","Глава 3. День, когда мы покорили мир","Глава 4. Потоп","Глава 5. История величайшего обмана в истории","Глава 6. Строительство пирамид"]
  }
];

const tests = [
  {
    bookId: 1,
    bookTitle: "Атомные привычки",
    question: "Сколько секунд занимает формирование автоматической реакции по Джеймсу Клиру?",
    options: ["130 секунд","До момента, пока привычка не требует усилий","40 дней","21 день"],
    correct: 1
  },
  {
    bookId: 1,
    bookTitle: "Атомные привычки",
    question: "Что такое «петля привычки» (habit loop)?",
    options: ["Ежедневное повторение одного действия","Триггер → желание → реакция → награда","Список целей на неделю","Журнал трекинга привычек"],
    correct: 1
  },
  {
    bookId: 3,
    bookTitle: "Sapiens",
    question: "Какую революцию Харари называет главной в истории Homo sapiens?",
    options: ["Промышленную","Цифровую","Когнитивную","Аграрную"],
    correct: 2
  }
];

// ── STATE ──
let currentTab = 'books';
let answeredTests = {};

// ── RENDER BOOKS ──
function renderBooks() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = '<div class="empty-state"><span class="emoji">📭</span>Книг пока нет.<br>Добавь первую через бот @mybookbrain_bot</div>';
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>

      <div class="progress-row">
        <div class="progress-label"><span>📖 Чтение</span><span>${b.reading_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill reading" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-row">
        <div class="progress-label"><span>🧠 Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill tests" style="width:${b.test_progress}%"></div></div>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${b.url}" target="_blank" onclick="event.stopPropagation()">🔗 Источник</a>
        <button class="chapters-btn" onclick="showChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── SHOW CHAPTERS ──
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-title').textContent = 'Главы';
  document.getElementById('chapters-meta').innerHTML = `
    <div class="bk-title">${book.title}</div>
    <div class="bk-author">${book.author}</div>
  `;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="ch-num">${i + 1}</div>
      <div class="ch-name">${ch}</div>
    </div>
  `).join('');

  hideAllScreens();
  document.getElementById('screen-chapters').classList.add('active');
  hideTabs();
}

function showBooks() {
  hideAllScreens();
  document.getElementById('screen-books').classList.add('active');
  showTabs();
  document.getElementById('tab-books').classList.add('active');
  document.getElementById('tab-tests').classList.remove('active');
  currentTab = 'books';
}

// ── RENDER TESTS ──
function renderTests() {
  const container = document.getElementById('tests-list');
  if (!tests.length) {
    container.innerHTML = '<div class="empty-state"><span class="emoji">🧘</span>Тестов пока нет.<br>Сначала добавь книгу и пройди главы.</div>';
    return;
  }
  container.innerHTML = tests.map((t, idx) => `
    <div class="test-card" id="test-${idx}">
      <div class="test-book">${t.bookTitle}</div>
      <div class="test-question">${t.question}</div>
      <div class="test-options">
        ${t.options.map((opt, oi) => `
          <div class="test-option" id="opt-${idx}-${oi}" onclick="answerTest(${idx},${oi})">${opt}</div>
        `).join('')}
      </div>
    </div>
  `).join('');

  // Восстановить ранее отвеченные
  Object.entries(answeredTests).forEach(([idx, chosen]) => {
    applyAnswer(parseInt(idx), chosen, tests[idx].correct);
  });
}

function answerTest(testIdx, optionIdx) {
  if (answeredTests.hasOwnProperty(testIdx)) return;
  answeredTests[testIdx] = optionIdx;
  applyAnswer(testIdx, optionIdx, tests[testIdx].correct);
}

function applyAnswer(testIdx, chosen, correct) {
  const allOpts = document.querySelectorAll(`#test-${testIdx} .test-option`);
  allOpts.forEach((el, oi) => {
    el.style.pointerEvents = 'none';
    if (oi === correct) el.classList.add('correct');
    else if (oi === chosen && chosen !== correct) el.classList.add('wrong');
  });
}

// ── TAB SWITCHING ──
function switchTab(tab) {
  if (tab === currentTab && document.getElementById(`screen-${tab}`).classList.contains('active')) return;
  currentTab = tab;
  hideAllScreens();
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  showTabs();
}

function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
}
function hideTabs() {
  document.querySelector('.tab-bar').style.display = 'none';
}
function showTabs() {
  document.querySelector('.tab-bar').style.display = 'flex';
}

// ── INIT ──
renderBooks();
renderTests();
</script>
</body>
</html>
