<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: var(--tg-theme-bg-color, #1c1c1e);
  --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #8e8e93);
  --link: var(--tg-theme-link-color, #0a84ff);
  --btn: var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --radius: 14px;
  --nav-h: 60px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── TABS ── */
.nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--hint);
  font-size: 11px;
  cursor: pointer;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--btn); }
.nav-btn svg { width: 24px; height: 24px; }

/* ── SCREENS ── */
.screen {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px calc(var(--nav-h) + 16px);
}
.screen.active { display: block; }

/* ── BOOK CARD ── */
.card {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 3px;
}
.card-author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 12px;
}

.progress-block { margin-bottom: 8px; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--hint);
  margin-bottom: 4px;
}
.progress-track {
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.1);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-fill.read { background: var(--btn); }
.progress-fill.test { background: #30d158; }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}
.card-link {
  font-size: 13px;
  color: var(--link);
  text-decoration: none;
}
.btn-chapters {
  background: var(--btn);
  color: var(--btn-text);
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}

/* ── CHAPTERS VIEW ── */
.chapters-view {
  display: none;
  padding: 16px 16px calc(var(--nav-h) + 16px);
  overflow-y: auto;
  flex: 1;
}
.chapters-view.active { display: block; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--btn);
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 16px;
  padding: 0;
}
.chapters-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}
.chapters-author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 16px;
}
.chapter-item {
  background: var(--bg2);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 8px;
  font-size: 15px;
}

/* ── TESTS SCREEN ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100vh - var(--nav-h) - 60px);
  color: var(--hint);
  gap: 12px;
}
.empty-state svg { width: 48px; height: 48px; opacity: 0.4; }
.empty-state p { font-size: 15px; }
</style>
</head>
<body>

<div class="app">

  <!-- Books screen -->
  <div class="screen active" id="screen-books"></div>

  <!-- Chapters view (overlays books) -->
  <div class="chapters-view" id="chapters-view">
    <button class="back-btn" onclick="closeChapters()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      Назад
    </button>
    <div class="chapters-title" id="ch-title"></div>
    <div class="chapters-author" id="ch-author"></div>
    <div id="ch-list"></div>
  </div>

  <!-- Tests screen -->
  <div class="screen" id="screen-tests">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <p>Тесты скоро появятся</p>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-books" onclick="showTab('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      Книги
    </button>
    <button class="nav-btn" id="nav-tests" onclick="showTab('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      Тесты
    </button>
  </nav>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com",
    chapters: ["Глава 1", "Глава 2", "Глава 3", "Глава 4", "Глава 5"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com",
    chapters: ["Глава 1", "Глава 2", "Глава 3"]
  }
];

// Render book cards
function renderBooks() {
  const el = document.getElementById('screen-books');
  el.innerHTML = books.map(b => `
    <div class="card">
      <div class="card-title">${b.title}</div>
      <div class="card-author">${b.author}</div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Чтение</span>
          <span>${b.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill read" style="width:${b.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Тесты</span>
          <span>${b.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill test" style="width:${b.test_progress}%"></div>
        </div>
      </div>

      <div class="card-footer">
        <a class="card-link" href="${b.url}" target="_blank">📖 Открыть книгу</a>
        <button class="btn-chapters" onclick="openChapters(${b.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

function openChapters(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  document.getElementById('ch-title').textContent = b.title;
  document.getElementById('ch-author').textContent = b.author;
  document.getElementById('ch-list').innerHTML = b.chapters.map((ch, i) => `
    <div class="chapter-item">${i + 1}. ${ch}</div>
  `).join('');
  document.getElementById('screen-books').classList.remove('active');
  document.getElementById('chapters-view').classList.add('active');
  if (tg) tg.BackButton.show();
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('active');
  document.getElementById('screen-books').classList.add('active');
  if (tg) tg.BackButton.hide();
}

if (tg) {
  tg.BackButton.onClick(closeChapters);
}

function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('chapters-view').classList.remove('active');
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tg) tg.BackButton.hide();
}

renderBooks();
</script>
</body>
</html>
