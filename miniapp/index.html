<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--tg-theme-bg-color,#1c1c1e);
  --bg2:var(--tg-theme-secondary-bg-color,#2c2c2e);
  --text:var(--tg-theme-text-color,#ffffff);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --link:var(--tg-theme-link-color,#0a84ff);
  --btn:var(--tg-theme-button-color,#0a84ff);
  --btn-text:var(--tg-theme-button-text-color,#ffffff);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px;overflow:hidden}
.screen{display:none;flex-direction:column;height:calc(100vh - var(--nav-h));overflow-y:auto;padding:16px;gap:12px}
.screen.active{display:flex}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,0.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--hint);font-size:11px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--btn)}
.nav-btn svg{width:24px;height:24px}

/* CARDS */
.card{background:var(--bg2);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px}
.card-title{font-size:16px;font-weight:600;line-height:1.3}
.card-author{font-size:13px;color:var(--hint)}
.progress-group{display:flex;flex-direction:column;gap:6px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--hint)}
.progress-track{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.fill-read{background:var(--btn)}
.fill-test{background:#30d158}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-link{font-size:13px;color:var(--link);text-decoration:none}
.card-link:hover{text-decoration:underline}
.btn-chapters{background:var(--btn);color:var(--btn-text);border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-chapters:active{opacity:.7}

/* CHAPTERS VIEW */
#chapters-view{display:none;flex-direction:column;height:calc(100vh - var(--nav-h));overflow-y:auto}
#chapters-view.active{display:flex}
.chapters-header{position:sticky;top:0;background:var(--bg);padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.08);z-index:10}
.btn-back{background:none;border:none;color:var(--btn);font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0}
.chapters-title{font-size:17px;font-weight:600}
.chapters-list{padding:12px 16px;display:flex;flex-direction:column;gap:2px}
.chapter-item{padding:14px 12px;border-radius:12px;font-size:15px;color:var(--text);background:none;transition:background .15s}
.chapter-item:hover{background:var(--bg2)}
.chapter-num{color:var(--hint);font-size:13px;margin-bottom:2px}

/* TESTS */
.tests-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:12px;color:var(--hint);text-align:center}
.tests-empty svg{opacity:.4}
.tests-empty p{font-size:15px}
</style>
</head>
<body>

<div id="screen-books" class="screen active"></div>
<div id="screen-tests" class="screen"></div>
<div id="chapters-view"></div>

<nav>
  <button class="nav-btn active" data-tab="books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="nav-btn" data-tab="tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила крошечных привычек","Глава 2. Как привычки формируют вашу идентичность","Глава 3. Как создать лучшие привычки за 4 шага","Глава 4. Человек, который не верит в систему убеждений","Глава 5. Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=thinking-fast-and-slow",
    chapters: ["Глава 1. Два персонажа истории","Глава 2. Внимание и усилие","Глава 3. Ленивый контролёр"]
  }
];

let currentBookId = null;

function renderBooks() {
  const el = document.getElementById('screen-books');
  el.innerHTML = books.map(b => `
    <div class="card">
      <div>
        <div class="card-title">${b.title}</div>
        <div class="card-author">${b.author}</div>
      </div>
      <div class="progress-group">
        <div class="progress-label"><span>📖 Прочитано</span><span>${b.reading_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill fill-read" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-group">
        <div class="progress-label"><span>✅ Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill fill-test" style="width:${b.test_progress}%"></div></div>
      </div>
      <div class="card-footer">
        <a class="card-link" href="${b.url}" target="_blank">🔗 Источник</a>
        <button class="btn-chapters" onclick="openChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

function renderTests() {
  document.getElementById('screen-tests').innerHTML = `
    <div class="tests-empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <p>Тесты появятся<br>после прочтения глав</p>
    </div>`;
}

function openChapters(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;
  currentBookId = id;

  const view = document.getElementById('chapters-view');
  view.innerHTML = `
    <div class="chapters-header">
      <button class="btn-back" onclick="closeChapters()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Назад
      </button>
      <span class="chapters-title">${book.title}</span>
    </div>
    <div class="chapters-list">
      ${book.chapters.map((ch, i) => `
        <div class="chapter-item">
          <div class="chapter-num">Глава ${i+1}</div>
          <div>${ch.replace(/^Глава \d+\.?\s*/,'')}</div>
        </div>
      `).join('')}
    </div>`;

  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.querySelector('nav').style.display = 'none';
  view.classList.add('active');
}

function closeChapters() {
  const view = document.getElementById('chapters-view');
  view.classList.remove('active');
  document.querySelector('nav').style.display = 'flex';
  switchTab('books');
}

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
}

renderBooks();
renderTests();
</script>
</body>
</html>
