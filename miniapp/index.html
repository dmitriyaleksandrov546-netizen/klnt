<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --radius: 16px;
    --nav-h: 64px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Контент ── */
  .screens {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 16px 16px calc(var(--nav-h) + 16px);
    display: none;
  }
  .screen.active { display: block; }

  /* ── Навигация ── */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg2);
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 11px;
    cursor: pointer;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--btn); }
  .nav-btn svg { width: 24px; height: 24px; }

  /* ── Заголовок экрана ── */
  .screen-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  /* ── Карточка книги ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .book-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 12px;
  }

  .progress-block { margin-bottom: 8px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 4px;
  }

  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-fill.read  { background: var(--btn); }
  .progress-fill.tests { background: #30d158; }

  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .book-link {
    font-size: 13px;
    color: var(--link);
    text-decoration: none;
  }
  .book-link:hover { text-decoration: underline; }

  .btn-chapters {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-chapters:active { opacity: .7; }

  /* ── Экран глав ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--link);
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 16px;
    padding: 0;
  }

  .chapter-list { list-style: none; }

  .chapter-item {
    background: var(--bg2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 15px;
  }

  /* ── Тесты ── */
  .test-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .test-book-name {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 6px;
  }

  .test-question {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .test-options { display: flex; flex-direction: column; gap: 8px; }

  .test-option {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    transition: background .15s;
  }
  .test-option:hover { background: rgba(255,255,255,0.12); }
  .test-option.correct { background: rgba(48,209,88,.25); border-color: #30d158; }
  .test-option.wrong   { background: rgba(255,69,58,.25);  border-color: #ff453a; }

  .empty-state {
    text-align: center;
    color: var(--hint);
    padding: 48px 0;
    font-size: 15px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="screens">

    <!-- Экран: Книги -->
    <div class="screen active" id="screen-books">
      <div class="screen-title">Мои книги</div>
      <div id="books-list"></div>
    </div>

    <!-- Экран: Главы конкретной книги -->
    <div class="screen" id="screen-chapters">
      <button class="back-btn" onclick="showBooks()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        Назад
      </button>
      <div class="screen-title" id="chapters-book-title">Главы</div>
      <ul class="chapter-list" id="chapters-list"></ul>
    </div>

    <!-- Экран: Тесты -->
    <div class="screen" id="screen-tests">
      <div class="screen-title">Тесты</div>
      <div id="tests-list"></div>
    </div>

  </div>

  <!-- Нижняя навигация -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-books" onclick="navigate('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      Книги
    </button>
    <button class="nav-btn" id="nav-tests" onclick="navigate('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      Тесты
    </button>
  </nav>
</div>

<script>
// ── Mock-данные ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила крошечных привычек","Глава 2. Как привычки формируют идентичность","Глава 3. Как создать лучшие привычки за 4 шага","Глава 4. Человек, который не верил в системы","Глава 5. Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно... решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=TA7Q_QfLBcAC",
    chapters: ["Глава 1. Действующие лица","Глава 2. Внимание и усилие","Глава 3. Ленивый контролёр"]
  }
];

const tests = [
  {
    book_id: 1,
    book_title: "Атомные привычки",
    question: "Какой минимальный шаг рекомендует Клир для формирования привычки?",
    options: ["30 минут в день", "Правило двух минут", "Ежечасное повторение", "Недельный цикл"],
    correct: 1
  },
  {
    book_id: 1,
    book_title: "Атомные привычки",
    question: "На чём основана система идентичности в книге?",
    options: ["На целях", "На результатах", "На убеждениях о себе", "На расписании"],
    correct: 2
  }
];

// ── Инициализация Telegram WebApp ──
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// ── Рендер книг ──
function renderBooks() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = '<div class="empty-state">Книг пока нет.<br>Добавьте первую через бота!</div>';
    return;
  }
  container.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Прочитано</span><span>${b.reading_progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill read" style="width:${b.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Тесты</span><span>${b.test_progress}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill tests" style="width:${b.test_progress}%"></div>
        </div>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${b.url}" target="_blank">🔗 Источник</a>
        <button class="btn-chapters" onclick="showChapters(${b.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

// ── Экран глав ──
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-book-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML = book.chapters
    .map((ch, i) => `<li class="chapter-item">${i+1}. ${ch}</li>`)
    .join('');

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-chapters').classList.add('active');

  // Скрыть нав-кнопки активного состояния
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

function showBooks() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-books').classList.add('active');
  document.getElementById('nav-books').classList.add('active');
}

// ── Рендер тестов ──
function renderTests() {
  const container = document.getElementById('tests-list');
  if (!tests.length) {
    container.innerHTML = '<div class="empty-state">Тестов пока нет.<br>Прочитайте книгу и пройдите тест!</div>';
    return;
  }
  container.innerHTML = tests.map((t, ti) => `
    <div class="test-card">
      <div class="test-book-name">📚 ${t.book_title}</div>
      <div class="test-question">${t.question}</div>
      <div class="test-options">
        ${t.options.map((opt, oi) => `
          <button class="test-option" onclick="answerTest(this, ${ti}, ${oi})">${opt}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function answerTest(btn, testIdx, optionIdx) {
  const card = btn.closest('.test-card');
  // Если уже ответили — игнорируем
  if (card.querySelector('.correct') || card.querySelector('.wrong')) return;

  const t = tests[testIdx];
  const allOpts = card.querySelectorAll('.test-option');
  allOpts.forEach(b => b.disabled = true);

  if (optionIdx === t.correct) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    allOpts[t.correct].classList.add('correct');
  }
}

// ── Навигация ──
function navigate(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
}

// ── Старт ──
renderBooks();
renderTests();
</script>
</body>
</html>
