<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #0a84ff);
    --btn: var(--tg-theme-button-color, #0a84ff);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --radius: 16px;
    --nav-h: 64px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* ── Контент ── */
  .screen {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: calc(var(--nav-h) + 16px);
    display: none;
  }
  .screen.active { display: block; }

  /* ── Нижняя навигация ── */
  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg2);
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 11px;
    cursor: pointer;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--btn); }
  .nav-btn svg { width: 24px; height: 24px; }

  /* ── Карточка книги ── */
  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .book-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .book-author {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 12px;
  }

  /* Прогресс-бары */
  .progress-block { margin-bottom: 10px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 4px;
  }
  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s ease;
  }
  .progress-fill.read  { background: var(--btn); }
  .progress-fill.tests { background: #30d158; }

  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }
  .book-link {
    font-size: 12px;
    color: var(--link);
    text-decoration: none;
  }
  .book-link:hover { text-decoration: underline; }
  .btn-chapters {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  /* ── Экран глав ── */
  #screen-chapters { display: none; }
  #screen-chapters.active { display: block; }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--link);
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 16px;
    padding: 0;
  }
  .chapters-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .chapter-item {
    background: var(--bg2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chapter-num {
    color: var(--hint);
    font-size: 13px;
    min-width: 24px;
  }

  /* ── Вкладка Тесты ── */
  .test-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .test-book-name {
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 6px;
  }
  .test-question {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .test-options { display: flex; flex-direction: column; gap: 8px; }
  .test-option {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: background .15s, border-color .15s;
  }
  .test-option:hover { background: rgba(255,255,255,0.1); }
  .test-option.correct { background: rgba(48,209,88,0.2); border-color: #30d158; }
  .test-option.wrong   { background: rgba(255,69,58,0.2);  border-color: #ff453a; }

  .section-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .empty-hint {
    text-align: center;
    color: var(--hint);
    padding: 48px 16px;
    font-size: 15px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Экран: Книги -->
  <div class="screen active" id="screen-books">
    <div class="section-title">📚 Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- Экран: Главы (внутри вкладки Книги) -->
  <div class="screen" id="screen-chapters">
    <button class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M15 18l-6-6 6-6"/></svg>
      Назад
    </button>
    <div class="chapters-title" id="chapters-book-title"></div>
    <div id="chapters-list"></div>
  </div>

  <!-- Экран: Тесты -->
  <div class="screen" id="screen-tests">
    <div class="section-title">✏️ Тесты</div>
    <div id="tests-list"></div>
  </div>

  <!-- Навигация -->
  <nav class="nav">
    <button class="nav-btn active" id="nav-books" onclick="showTab('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      Книги
    </button>
    <button class="nav-btn" id="nav-tests" onclick="showTab('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      Тесты
    </button>
  </nav>
</div>

<script>
// ── Mock-данные ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Введение: Удивительная сила атомных привычек","Глава 1: Удивительная сила атомных привычек","Глава 2: Как привычки формируют вашу идентичность","Глава 3: Как создать лучшие привычки за 4 шага","Глава 4: Человек, который не смотрит в телефон","Глава 5: Лучший способ начать новую привычку","Глава 6: Мотивация переоценена — среда важнее","Глава 7: Секрет самоконтроля","Глава 8: Как сделать хорошую привычку неотразимой"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=TA7Q27K5nY0C",
    chapters: ["Введение","Часть 1: Две системы","Глава 1: Действующие лица","Глава 2: Внимание и усилие","Глава 3: Ленивый контролёр","Глава 4: Ассоциативная машина","Часть 2: Эвристика и предубеждения"]
  },
  {
    id: 3,
    title: "Sapiens: Краткая история человечества",
    author: "Юваль Ной Харари",
    reading_progress: 5,
    test_progress: 0,
    url: "https://books.google.com/books?id=1EiJAwAAQBAJ",
    chapters: ["Часть 1: Когнитивная революция","Часть 2: Сельскохозяйственная революция","Часть 3: Объединение человечества","Часть 4: Научная революция"]
  }
];

const tests = [
  {
    id: 1,
    book_id: 1,
    question: "Что такое «атомная привычка» по Джеймсу Клиру?",
    options: ["Очень сложная привычка","Маленькое изменение, дающее огромный результат","Привычка связанная с химией","Привычка выполняемая автоматически"],
    correct: 1
  },
  {
    id: 2,
    book_id: 1,
    question: "Сколько шагов в петле формирования привычки?",
    options: ["2","3","4","5"],
    correct: 2
  },
  {
    id: 3,
    book_id: 2,
    question: "Как Канеман называет быстрое интуитивное мышление?",
    options: ["Система А","Система 1","Быстрый ум","Автопилот"],
    correct: 1
  }
];

// ── Состояние ──
let currentTab = 'books';
let previousScreen = null;

// ── Инициализация Telegram WebApp ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Рендер книг ──
function renderBooks() {
  const list = document.getElementById('books-list');
  if (!books.length) {
    list.innerHTML = '<div class="empty-hint">У вас пока нет книг.<br>Добавьте книгу через бота.</div>';
    return;
  }
  list.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>

      <div class="progress-block">
        <div class="progress-label">
          <span>📖 Прочитано</span>
          <span>${b.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill read" style="width:${b.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>✏️ Тесты</span>
          <span>${b.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${b.test_progress}%"></div>
        </div>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${b.url}" target="_blank">🔗 Источник</a>
        <button class="btn-chapters" onclick="showChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── Экран глав ──
function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-book-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <span class="chapter-num">${i + 1}</span>
      <span>${ch}</span>
    </div>
  `).join('');

  document.getElementById('screen-books').classList.remove('active');
  document.getElementById('screen-chapters').classList.add('active');
  previousScreen = 'books';
}

function goBack() {
  document.getElementById('screen-chapters').classList.remove('active');
  document.getElementById('screen-books').classList.add('active');
}

// ── Рендер тестов ──
function renderTests() {
  const list = document.getElementById('tests-list');
  if (!tests.length) {
    list.innerHTML = '<div class="empty-hint">Тесты появятся после прохождения глав.</div>';
    return;
  }
  list.innerHTML = tests.map(t => {
    const book = books.find(b => b.id === t.book_id);
    return `
      <div class="test-card" id="test-${t.id}">
        <div class="test-book-name">${book ? book.title : ''}</div>
        <div class="test-question">${t.question}</div>
        <div class="test-options">
          ${t.options.map((opt, i) => `
            <button class="test-option" onclick="answerTest(${t.id}, ${i}, ${t.correct})">${opt}</button>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function answerTest(testId, chosen, correct) {
  const card = document.getElementById(`test-${testId}`);
  const options = card.querySelectorAll('.test-option');
  options.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });
}

// ── Переключение вкладок ──
function showTab(tab) {
  currentTab = tab;

  // скрываем все экраны
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'books') {
    document.getElementById('screen-books').classList.add('active');
    document.getElementById('nav-books').classList.add('active');
  } else {
    document.getElementById('screen-tests').classList.add('active');
    document.getElementById('nav-tests').classList.add('active');
  }
}

// ── Запуск ──
renderBooks();
renderTests();
</script>
</body>
</html>
