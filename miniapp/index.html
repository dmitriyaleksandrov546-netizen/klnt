<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MEMORY · BookBrain</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:var(--tg-theme-bg-color,#1c1c1e);
  --bg2:var(--tg-theme-secondary-bg-color,#2c2c2e);
  --bg3:#3a3a3c;
  --text:var(--tg-theme-text-color,#fff);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --link:var(--tg-theme-link-color,#0a84ff);
  --btn:var(--tg-theme-button-color,#0a84ff);
  --btn-text:var(--tg-theme-button-text-color,#fff);
  --accent:#7effd4;
  --danger:#ff453a;
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.topbar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06)}
.topbar h1{font-size:17px;font-weight:600}
.topbar .actions{display:flex;gap:8px}
.icon-btn{background:none;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;cursor:pointer}
.icon-btn.primary{background:var(--btn);color:var(--btn-text);border-color:var(--btn)}
.icon-btn.danger{color:var(--danger);border-color:var(--danger)}
.icon-btn:disabled{opacity:.4}
.screen{flex:1;overflow-y:auto;padding:12px 16px 24px;display:none}
.screen.active{display:block}
nav{height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.08);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--hint);font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer}
nav button.active{color:var(--btn)}
.card{background:var(--bg2);border-radius:14px;padding:14px;margin-bottom:10px;position:relative}
.card.selected{outline:2px solid var(--accent);outline-offset:-2px}
.card-row{display:flex;gap:12px;align-items:flex-start}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,.25);flex-shrink:0;cursor:pointer;display:none;align-items:center;justify-content:center;transition:.15s;margin-top:2px}
.mode-edit .checkbox{display:inline-flex}
.checkbox.checked{background:var(--accent);border-color:var(--accent)}
.checkbox.checked::after{content:'';width:6px;height:11px;border-right:2px solid #04140c;border-bottom:2px solid #04140c;transform:rotate(45deg) translate(-1px,-1px)}
.card-main{flex:1;min-width:0}
.card h3{font-size:16px;font-weight:600;margin-bottom:2px;word-wrap:break-word}
.card .author{font-size:13px;color:var(--hint);margin-bottom:10px}
.progress-wrap{margin-bottom:6px}
.progress-label{font-size:11px;color:var(--hint);margin-bottom:3px;display:flex;justify-content:space-between}
.progress-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--btn);transition:width .3s}
.progress-fill.green{background:#30d158}
.card-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px;flex-wrap:wrap}
.card-actions .link-btn{background:none;border:none;font-size:13px;color:var(--link);cursor:pointer;padding:6px 0}
.card-actions .open-btn{background:var(--btn);color:var(--btn-text);border:none;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:500}
.empty{text-align:center;color:var(--hint);margin-top:80px;font-size:15px;padding:0 20px;line-height:1.5}
.empty .big{font-size:48px;margin-bottom:12px;opacity:.5}
.loading{text-align:center;padding:40px;color:var(--hint);font-size:14px}

.fab{position:fixed;bottom:calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));right:16px;width:54px;height:54px;border-radius:50%;background:var(--btn);color:var(--btn-text);border:none;font-size:26px;font-weight:300;box-shadow:0 4px 14px rgba(10,132,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:14px;font-weight:600}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:var(--hint);margin-bottom:6px}
.field input,.field textarea{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--btn)}
.field textarea{resize:vertical;min-height:120px;line-height:1.45}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:500;cursor:pointer}
.btn-primary{background:var(--btn);color:var(--btn-text)}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text)}

.chapters-screen,.note-screen,.tests-screen{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column}
.chapters-screen.active,.note-screen.active,.tests-screen.active{display:flex}
.sub-header{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.back-btn{background:none;border:none;color:var(--link);font-size:17px;cursor:pointer;padding:4px 8px 4px 0}
.sub-header .title-wrap{flex:1;min-width:0}
.sub-header h2{font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-header .subtitle{font-size:12px;color:var(--hint);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scroll-list{flex:1;overflow-y:auto;padding:8px 12px 24px}
.chapter-item{background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.chapter-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.25);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.chapter-check.done{background:#30d158;border-color:#30d158}
.chapter-check.done::after{content:'';width:5px;height:10px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.chapter-title{flex:1;font-size:15px;min-width:0;word-wrap:break-word}
.chapter-title.done{color:var(--hint);text-decoration:line-through}
.chapter-btns{display:flex;gap:6px;flex-shrink:0}
.chapter-btns button{background:rgba(255,255,255,.06);color:var(--text);border:none;border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.chapter-btns button.has-note{background:var(--accent);color:#04140c;font-weight:500}
.note-body{flex:1;padding:16px;display:flex;flex-direction:column}
.note-body textarea{flex:1;width:100%;background:transparent;border:none;color:var(--text);font-size:16px;line-height:1.5;outline:none;resize:none;font-family:inherit}
.note-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:10px}
.note-footer button{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:500;cursor:pointer}
.test-item{background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:10px}
.test-item.r-know{box-shadow:inset 3px 0 0 #30d158}
.test-item.r-partial{box-shadow:inset 3px 0 0 #ffd60a}
.test-item.r-dont_know{box-shadow:inset 3px 0 0 var(--danger)}
.test-q{font-size:15px;font-weight:500;margin-bottom:8px;line-height:1.4}
.test-meta{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11px;color:var(--hint);margin-bottom:8px}
.test-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.06)}
.test-badge.r-know{background:rgba(48,209,88,.18);color:#30d158}
.test-badge.r-partial{background:rgba(255,214,10,.18);color:#ffd60a}
.test-badge.r-dont_know{background:rgba(255,69,58,.18);color:var(--danger)}
.test-answer-input{width:100%;min-height:80px;background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;line-height:1.45;resize:vertical;outline:none;margin-top:6px}
.test-answer-input:focus{border-color:var(--btn)}
.test-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.test-actions button{background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s}
.test-actions button.primary{background:var(--btn);color:var(--btn-text);border-color:var(--btn)}
.test-actions button.danger{background:rgba(255,69,58,.18);color:var(--danger);border-color:var(--danger)}
.test-actions button:disabled{opacity:.5;cursor:wait}
.test-actions .rec-btn.recording{background:rgba(255,69,58,.22);border-color:var(--danger);color:var(--danger);animation:pulse 1.2s infinite}
.test-actions .link{background:none;border:none;color:var(--link);padding:8px 4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.test-result{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);display:none}
.test-result.shown{display:block}
.test-verdict{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:14px;font-weight:600}
.test-verdict.r-know{color:#30d158}
.test-verdict.r-partial{color:#ffd60a}
.test-verdict.r-dont_know{color:var(--danger)}
.test-feedback{font-size:13px;line-height:1.45;color:var(--text);margin-bottom:8px}
.test-reference{font-size:13px;line-height:1.45;color:var(--hint);background:rgba(255,255,255,.03);padding:8px 10px;border-radius:8px;margin-bottom:10px}
.test-reference b{color:var(--text);font-weight:600;display:block;margin-bottom:3px;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.test-rate{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.test-rate button{flex:1;min-width:90px;background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 10px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:5px}
.test-rate button:hover{background:rgba(255,255,255,.1)}
.test-rate button.active.r-know{background:rgba(48,209,88,.22);border-color:#30d158;color:#30d158}
.test-rate button.active.r-partial{background:rgba(255,214,10,.22);border-color:#ffd60a;color:#ffd60a}
.test-rate button.active.r-dont_know{background:rgba(255,69,58,.22);border-color:var(--danger);color:var(--danger)}
.test-rate-label{font-size:11px;color:var(--hint);margin-top:8px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.chapter-tests-meta{font-size:11px;color:var(--hint);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.chapter-tests-meta span.has{color:var(--text)}
.chapter-tests-meta .pip{display:inline-flex;align-items:center;gap:3px}
.chapter-tests-meta .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.progress-fill.purple{background:#bf5af2}
.toast{position:fixed;bottom:calc(var(--nav-h) + 80px);left:50%;transform:translateX(-50%);background:var(--bg2);padding:10px 16px;border-radius:10px;font-size:13px;z-index:200;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 14px rgba(0,0,0,.4);display:none}
.toast.show{display:block}
.toast.error{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1 id="topbar-title">📚 MEMORY</h1>
    <div class="actions" id="topbar-actions">
      <button class="icon-btn" id="edit-btn" onclick="toggleEdit()" style="display:none">Изменить</button>
    </div>
  </div>

  <div id="screen-books" class="screen active">
    <div class="loading" id="books-loading">Загружаю книги…</div>
    <div class="books-list" id="books-list"></div>
  </div>

  <div id="screen-tests" class="screen">
    <div class="empty"><div class="big">✅</div>Выбери книгу → главу → «Тесты», там вопросы по этой главе.<br><br>Также все тесты сохранены — позже сделаем общий тест по книге.</div>
  </div>

  <button class="fab" id="fab-add" onclick="openAddModal()">+</button>

  <nav>
    <button class="active" onclick="switchTab('books')" id="tab-books">
      <span style="font-size:22px">📚</span><span>Книги</span>
    </button>
    <button onclick="switchTab('tests')" id="tab-tests">
      <span style="font-size:22px">✅</span><span>Тесты</span>
    </button>
  </nav>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Новая книга</h2>
    <p style="font-size:13px;color:var(--hint);margin-bottom:14px">💡 Удобнее добавить голосом в чат: скажи «Атомные привычки Джеймса Клира» — бот сам подтянет реальные главы и сгенерит тесты.</p>
    <div class="field">
      <label>Название</label>
      <input type="text" id="add-title" placeholder="Атомные привычки">
    </div>
    <div class="field">
      <label>Автор</label>
      <input type="text" id="add-author" placeholder="Джеймс Клир">
    </div>
    <div class="field">
      <label>Количество глав</label>
      <input type="number" id="add-chapters-count" min="1" max="200" value="10">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddModal()">Отмена</button>
      <button class="btn-primary" onclick="addBook()">Добавить</button>
    </div>
  </div>
</div>

<div class="chapters-screen" id="chapters-screen">
  <div class="sub-header">
    <button class="back-btn" onclick="closeChapters()">← Назад</button>
    <div class="title-wrap">
      <h2 id="chapters-title"></h2>
      <div class="subtitle" id="chapters-author"></div>
    </div>
  </div>
  <div class="scroll-list" id="chapters-list"></div>
</div>

<div class="note-screen" id="note-screen">
  <div class="sub-header">
    <button class="back-btn" onclick="closeNote()">← Назад</button>
    <div class="title-wrap">
      <h2 id="note-title"></h2>
      <div class="subtitle" id="note-book"></div>
    </div>
  </div>
  <div class="note-body">
    <textarea id="note-text" placeholder="Тезисы по главе. Сохранится автоматически.&#10;&#10;💡 Можно надиктовать голосом в чат: «Глава 3 [название книги], тезисы: …»"></textarea>
  </div>
  <div class="note-footer">
    <button class="btn-secondary" onclick="deleteNote()">Очистить</button>
    <button class="btn-primary" onclick="closeNote()">Сохранить</button>
  </div>
</div>

<div class="tests-screen" id="tests-screen">
  <div class="sub-header">
    <button class="back-btn" onclick="closeTests()">← Назад</button>
    <div class="title-wrap">
      <h2 id="tests-title">Тесты</h2>
      <div class="subtitle" id="tests-book"></div>
    </div>
  </div>
  <div class="scroll-list" id="tests-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// Absolute URL: Mini App может быть на любом хосте (github.io, vercel preview...),
// API всегда на production Vercel.
const API_BASE = 'https://klnt.vercel.app/api/bookbot';

async function api(method, path, body) {
  const headers = { 'X-Telegram-Init-Data': tg?.initData || '' };
  if (body) headers['Content-Type'] = 'application/json';
  const r = await fetch(API_BASE + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  let data = null;
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('json')) {
    try { data = await r.json(); } catch (e) {}
  } else {
    try { data = await r.text(); } catch (e) {}
  }
  if (!r.ok) {
    const err = (data && typeof data === 'object' && data.error) || `HTTP ${r.status}`;
    throw new Error(err);
  }
  return data;
}

let state = { books: [], currentBookId: null, currentBook: null, currentChapters: [], currentChapterId: null, currentChapter: null, currentTests: [] };
let editMode = false;
let selected = new Set();

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ───── books list ─────
async function loadBooks() {
  document.getElementById('books-loading').style.display = '';
  document.getElementById('books-list').innerHTML = '';
  try {
    const r = await api('GET', '/books');
    state.books = r.books || [];
    renderBooks();
  } catch (e) {
    document.getElementById('books-loading').textContent = '⚠ ' + e.message;
  }
}

function renderBooks() {
  document.getElementById('books-loading').style.display = 'none';
  const el = document.getElementById('books-list');
  if (!state.books.length) {
    el.innerHTML = '<div class="empty"><div class="big">📚</div>Пока пусто.<br>Скажи название книги <b>голосом в чат</b> — бот добавит её с реальными главами и тестами.<br><br>Или нажми + и заведи вручную.</div>';
    document.getElementById('edit-btn').style.display = 'none';
    return;
  }
  document.getElementById('edit-btn').style.display = '';
  el.innerHTML = state.books.map(b => {
    const total = b.total_chapters || 0;
    const read = b.read_count || 0;
    const notes = b.notes_count || 0;
    const tTotal = b.tests_total || 0;
    const tKnown = b.tests_known || 0;
    const readPct = total ? Math.round(read/total*100) : 0;
    const notesPct = total ? Math.round(notes/total*100) : 0;
    const knownPct = tTotal ? Math.round(tKnown/tTotal*100) : 0;
    const isSel = selected.has(b.id);
    return `
      <div class="card ${isSel ? 'selected' : ''}" data-id="${b.id}">
        <div class="card-row">
          <div class="checkbox ${isSel ? 'checked' : ''}" onclick="toggleSelect(${b.id})"></div>
          <div class="card-main">
            <h3>${escapeHtml(b.title)}</h3>
            <div class="author">${escapeHtml(b.author || '—')}</div>
            <div class="progress-wrap">
              <div class="progress-label"><span>Прочитано глав</span><span>${read}/${total} · ${readPct}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${readPct}%"></div></div>
            </div>
            <div class="progress-wrap">
              <div class="progress-label"><span>Конспектов</span><span>${notes}/${total} · ${notesPct}%</span></div>
              <div class="progress-bar"><div class="progress-fill green" style="width:${notesPct}%"></div></div>
            </div>
            ${tTotal ? `
            <div class="progress-wrap">
              <div class="progress-label"><span>Знаю</span><span>${tKnown}/${tTotal} · ${knownPct}%</span></div>
              <div class="progress-bar"><div class="progress-fill purple" style="width:${knownPct}%"></div></div>
            </div>` : ''}
            <div class="card-actions">
              <button class="link-btn" onclick="openExternal(${b.id})">🔍 Найти в интернете</button>
              <button class="open-btn" onclick="openChapters(${b.id})">Главы</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
  el.parentElement.classList.toggle('mode-edit', editMode);
}

function switchTab(t) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + t).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('fab-add').style.display = t === 'books' ? '' : 'none';
}

function toggleEdit() {
  editMode = !editMode;
  selected.clear();
  const editBtn = document.getElementById('edit-btn');
  const actions = document.getElementById('topbar-actions');
  if (editMode) {
    editBtn.textContent = 'Готово';
    if (!document.getElementById('delete-btn')) {
      const d = document.createElement('button');
      d.id = 'delete-btn';
      d.className = 'icon-btn danger';
      d.textContent = 'Удалить';
      d.onclick = deleteSelected;
      d.disabled = true;
      actions.insertBefore(d, editBtn);
    }
  } else {
    editBtn.textContent = 'Изменить';
    document.getElementById('delete-btn')?.remove();
  }
  renderBooks();
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  document.getElementById('delete-btn').disabled = selected.size === 0;
  renderBooks();
}

async function deleteSelected() {
  if (!selected.size) return;
  if (!confirm(`Удалить выбранных книг: ${selected.size}?`)) return;
  for (const id of selected) {
    try { await api('DELETE', `/books/${id}`); } catch (e) { toast('Ошибка: ' + e.message, true); }
  }
  selected.clear();
  toggleEdit();
  await loadBooks();
}

// ───── add book ─────
function openAddModal() {
  document.getElementById('add-title').value = '';
  document.getElementById('add-author').value = '';
  document.getElementById('add-chapters-count').value = 10;
  document.getElementById('add-modal').classList.add('active');
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('active');
}
async function addBook() {
  const title = document.getElementById('add-title').value.trim();
  const author = document.getElementById('add-author').value.trim();
  const cnt = parseInt(document.getElementById('add-chapters-count').value || '0', 10);
  if (!title) { toast('Укажи название', true); return; }
  if (!(cnt > 0 && cnt <= 500)) { toast('Глав 1-500', true); return; }
  try {
    await api('POST', '/books', { title, author, total_chapters: cnt });
    closeAddModal();
    await loadBooks();
    toast('✓ Добавлено');
  } catch (e) { toast('Ошибка: ' + e.message, true); }
}

function openExternal(id) {
  const b = state.books.find(x => x.id === id);
  if (!b) return;
  const q = encodeURIComponent(`${b.title} ${b.author || ''} читать`.trim());
  const url = `https://www.google.com/search?q=${q}`;
  if (tg?.openLink) tg.openLink(url); else window.open(url, '_blank');
}

// ───── chapters ─────
async function openChapters(bookId) {
  state.currentBookId = bookId;
  document.getElementById('chapters-list').innerHTML = '<div class="loading">Загружаю главы…</div>';
  document.getElementById('chapters-screen').classList.add('active');
  if (tg?.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(closeChapters); }
  try {
    const r = await api('GET', `/books/${bookId}/chapters`);
    state.currentBook = r.book;
    state.currentChapters = r.chapters;
    document.getElementById('chapters-title').textContent = r.book.title;
    document.getElementById('chapters-author').textContent = r.book.author || '';
    renderChapters();
  } catch (e) {
    document.getElementById('chapters-list').innerHTML = '<div class="loading">⚠ ' + e.message + '</div>';
  }
}

function closeChapters() {
  document.getElementById('chapters-screen').classList.remove('active');
  state.currentBookId = null;
  if (tg?.BackButton) tg.BackButton.hide();
  loadBooks();
}

function renderChapters() {
  const el = document.getElementById('chapters-list');
  el.innerHTML = state.currentChapters.map(c => {
    const tt = c.tests_total || 0;
    const tk = c.tests_known || 0;
    const tp = c.tests_partial || 0;
    const td = c.tests_dont_know || 0;
    const meta = tt ? `
      <div class="chapter-tests-meta">
        ${tk ? `<span class="pip has"><span class="dot" style="background:#30d158"></span>${tk}</span>` : ''}
        ${tp ? `<span class="pip has"><span class="dot" style="background:#ffd60a"></span>${tp}</span>` : ''}
        ${td ? `<span class="pip has"><span class="dot" style="background:var(--danger)"></span>${td}</span>` : ''}
        <span class="pip">${tk + tp + td}/${tt}</span>
      </div>` : '';
    return `
    <div class="chapter-item">
      <div class="chapter-check ${c.is_read ? 'done' : ''}" onclick="toggleRead(${c.id}, ${c.is_read ? 0 : 1})"></div>
      <div class="chapter-title-wrap" style="flex:1;min-width:0">
        <div class="chapter-title ${c.is_read ? 'done' : ''}"><b>${c.chapter_num}.</b> ${escapeHtml(c.title)}</div>
        ${meta}
      </div>
      <div class="chapter-btns">
        <button class="${c.has_note ? 'has-note' : ''}" onclick="openNote(${c.id})">📝</button>
        <button onclick="openTests(${c.id})">✅</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleRead(chId, newVal) {
  try {
    await api('PATCH', `/chapters/${chId}`, { is_read: !!newVal });
    const c = state.currentChapters.find(x => x.id === chId);
    if (c) c.is_read = newVal ? 1 : 0;
    renderChapters();
  } catch (e) { toast('Ошибка: ' + e.message, true); }
}

// ───── note ─────
let noteSaveTimer = null;
async function openNote(chId) {
  state.currentChapterId = chId;
  const c = state.currentChapters.find(x => x.id === chId);
  state.currentChapter = c;
  document.getElementById('note-title').textContent = c.title;
  document.getElementById('note-book').textContent = state.currentBook?.title || '';
  // list_chapters теперь возвращает user_note напрямую — не делаем второй запрос.
  document.getElementById('note-text').value = c.user_note || '';
  document.getElementById('note-screen').classList.add('active');
}

function closeNote() {
  saveCurrentNote(true);
  document.getElementById('note-screen').classList.remove('active');
  state.currentChapterId = null;
}

async function saveCurrentNote(immediate) {
  if (state.currentChapterId === null) return;
  const text = document.getElementById('note-text').value;
  const id = state.currentChapterId;
  clearTimeout(noteSaveTimer);
  const fn = async () => {
    try {
      await api('PATCH', `/chapters/${id}`, { note: text });
      const c = state.currentChapters.find(x => x.id === id);
      if (c) c.has_note = text.trim() ? 1 : 0;
    } catch (e) { /* ignore for autosave */ }
  };
  if (immediate) await fn();
  else noteSaveTimer = setTimeout(fn, 800);
}

function deleteNote() {
  document.getElementById('note-text').value = '';
  saveCurrentNote(true);
}

document.getElementById('note-text').addEventListener('input', () => saveCurrentNote(false));

// ───── tests ─────
const RESULT_LABEL = { know: '🟢 Знал', partial: '🟡 Частично', dont_know: '🔴 Не знал' };

function testCardHtml(t, i) {
  const lr = t.last_result || '';
  const badge = lr ? `<span class="test-badge r-${lr}">${RESULT_LABEL[lr]}</span>` : '';
  return `
    <div class="test-item ${lr ? 'r-'+lr : ''}" data-id="${t.id}">
      <div class="test-meta">
        <span>Вопрос ${i+1}${t.difficulty ? ' · '+escapeHtml(t.difficulty) : ''}</span>
        ${badge}
      </div>
      <div class="test-q">${escapeHtml(t.question)}</div>
      <textarea class="test-answer-input" placeholder="Твой ответ — текстом или надиктуй голосом"></textarea>
      <div class="test-actions">
        <button class="rec-btn" onclick="toggleRecord(this, ${t.id})">🎙 Голосом</button>
        <button class="primary" onclick="checkAnswer(${t.id})">Проверить</button>
        <button class="link" onclick="showAnswerWithoutCheck(${t.id})">Показать ответ</button>
      </div>
      <div class="test-result">
        <div class="test-verdict" style="display:none"><span class="verdict-icon"></span><span class="verdict-text"></span></div>
        <div class="test-feedback" style="display:none"></div>
        <div class="test-reference"><b>Эталонный ответ</b><span class="ref-text"></span></div>
        <div class="test-rate-label">Оценить себя</div>
        <div class="test-rate">
          <button class="${lr==='know'?'active r-know':''}" onclick="rateTest(${t.id},'know')">🟢 Знал</button>
          <button class="${lr==='partial'?'active r-partial':''}" onclick="rateTest(${t.id},'partial')">🟡 Частично</button>
          <button class="${lr==='dont_know'?'active r-dont_know':''}" onclick="rateTest(${t.id},'dont_know')">🔴 Не знал</button>
        </div>
      </div>
    </div>`;
}

async function openTests(chId) {
  state.currentChapterId = chId;
  const c = state.currentChapters.find(x => x.id === chId);
  document.getElementById('tests-title').textContent = `Тесты: ${c.title}`;
  document.getElementById('tests-book').textContent = state.currentBook?.title || '';
  document.getElementById('tests-list').innerHTML = '<div class="loading">Загружаю тесты…</div>';
  document.getElementById('tests-screen').classList.add('active');
  try {
    const r = await api('GET', `/chapters/${chId}/tests`);
    const tests = r.tests || [];
    if (!tests.length) {
      document.getElementById('tests-list').innerHTML = '<div class="empty">Тестов нет. Добавь книгу голосом — бот сгенерирует.</div>';
      return;
    }
    state.currentTests = tests;
    document.getElementById('tests-list').innerHTML = tests.map((t, i) => testCardHtml(t, i)).join('');
  } catch (e) {
    document.getElementById('tests-list').innerHTML = '<div class="loading">⚠ ' + e.message + '</div>';
  }
}

async function checkAnswer(testId) {
  const card = document.querySelector(`.test-item[data-id="${testId}"]`);
  if (!card) return;
  const ta = card.querySelector('.test-answer-input');
  const text = (ta.value || '').trim();
  if (!text) { toast('Введи ответ или надиктуй голосом', true); ta.focus(); return; }
  const btn = card.querySelector('.test-actions .primary');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Проверяю…';
  try {
    const r = await api('POST', `/tests/${testId}/check`, { answer: text });
    fillResult(card, { verdict: r.verdict, feedback: r.feedback, reference: r.reference });
  } catch (e) {
    toast('Ошибка: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

function showAnswerWithoutCheck(testId) {
  const card = document.querySelector(`.test-item[data-id="${testId}"]`);
  if (!card) return;
  const t = (state.currentTests || []).find(x => x.id === testId);
  fillResult(card, { reference: t ? (t.answer || '') : '', verdict: null, feedback: '' });
}

function fillResult(card, r) {
  const res = card.querySelector('.test-result');
  res.classList.add('shown');
  res.querySelector('.ref-text').textContent = r.reference || '(эталон не указан)';
  const verdictEl = res.querySelector('.test-verdict');
  const feedbackEl = res.querySelector('.test-feedback');
  if (r.verdict) {
    verdictEl.className = 'test-verdict r-' + r.verdict;
    verdictEl.querySelector('.verdict-icon').textContent = r.verdict === 'know' ? '🟢' : r.verdict === 'partial' ? '🟡' : '🔴';
    verdictEl.querySelector('.verdict-text').textContent = 'Claude: ' + RESULT_LABEL[r.verdict];
    verdictEl.style.display = '';
    feedbackEl.textContent = r.feedback || '';
    feedbackEl.style.display = r.feedback ? '' : 'none';
  } else {
    verdictEl.style.display = 'none';
    feedbackEl.style.display = 'none';
  }
}

// ─── voice recording ───
let _recState = { recorder: null, stream: null, btn: null, mimeType: '' };

async function toggleRecord(btn, testId) {
  if (_recState.recorder && _recState.recorder.state === 'recording') {
    _recState.recorder.stop();
    return;
  }
  if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
    toast('Браузер не поддерживает запись', true);
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    toast('Нет доступа к микрофону', true);
    return;
  }
  let mimeType = '';
  for (const m of ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg;codecs=opus']) {
    if (MediaRecorder.isTypeSupported(m)) { mimeType = m; break; }
  }
  const chunks = [];
  const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  _recState = { recorder, stream, btn, mimeType };
  recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
  recorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    btn.classList.remove('recording');
    btn.disabled = true;
    btn.textContent = '⏳ Распознаю…';
    try {
      const blob = new Blob(chunks, { type: mimeType || 'audio/webm' });
      const ext = (mimeType.includes('mp4')) ? 'm4a' : (mimeType.includes('ogg')) ? 'ogg' : 'webm';
      const fd = new FormData();
      fd.append('audio', blob, 'voice.' + ext);
      const r = await fetch(API_BASE + '/voice-transcribe', {
        method: 'POST',
        headers: { 'X-Telegram-Init-Data': tg?.initData || '' },
        body: fd,
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      const card = btn.closest('.test-item');
      const ta = card.querySelector('.test-answer-input');
      ta.value = (ta.value ? ta.value.trimEnd() + ' ' : '') + (data.transcript || '');
      ta.focus();
    } catch (e) {
      toast('Ошибка распознавания: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '🎙 Голосом';
      _recState = { recorder: null, stream: null, btn: null, mimeType: '' };
    }
  };
  recorder.start();
  btn.classList.add('recording');
  btn.textContent = '⏹ Стоп';
}

async function rateTest(testId, result) {
  const card = document.querySelector(`.test-item[data-id="${testId}"]`);
  if (!card) return;
  // Локально знаем предыдущий результат — обновим счётчики главы без запроса.
  const t = (state.currentTests || []).find(x => x.id === testId);
  const oldResult = t ? t.last_result : null;
  applyTestResult(card, result);
  if (t) { t.last_result = result; t.last_attempt_at = new Date().toISOString(); }
  bumpLocalChapterCount(state.currentChapterId, oldResult, result);
  try {
    await api('POST', `/tests/${testId}/attempt`, { result });
  } catch (e) {
    toast('Ошибка: ' + e.message, true);
    // Откат
    if (t) t.last_result = oldResult;
    bumpLocalChapterCount(state.currentChapterId, result, oldResult);
    applyTestResult(card, oldResult);
  }
}

function bumpLocalChapterCount(chapterId, oldResult, newResult) {
  if (!chapterId) return;
  const c = (state.currentChapters || []).find(x => x.id === chapterId);
  if (!c) return;
  const buckets = { know: 'tests_known', partial: 'tests_partial', dont_know: 'tests_dont_know' };
  if (oldResult && buckets[oldResult]) {
    c[buckets[oldResult]] = Math.max(0, (c[buckets[oldResult]] || 0) - 1);
  }
  if (newResult && buckets[newResult]) {
    c[buckets[newResult]] = (c[buckets[newResult]] || 0) + 1;
  }
}

function applyTestResult(card, result) {
  card.classList.remove('r-know', 'r-partial', 'r-dont_know');
  if (result) card.classList.add('r-' + result);
  // bage
  const meta = card.querySelector('.test-meta');
  let badge = meta.querySelector('.test-badge');
  if (!result) { if (badge) badge.remove(); }
  else {
    if (!badge) {
      badge = document.createElement('span');
      meta.appendChild(badge);
    }
    badge.className = 'test-badge r-' + result;
    badge.textContent = RESULT_LABEL[result];
  }
  // кнопки rate
  card.querySelectorAll('.test-rate button').forEach(b => {
    b.classList.remove('active', 'r-know', 'r-partial', 'r-dont_know');
  });
  if (result) {
    const idx = result === 'know' ? 0 : result === 'partial' ? 1 : 2;
    const btn = card.querySelectorAll('.test-rate button')[idx];
    if (btn) btn.classList.add('active', 'r-' + result);
  }
}

function closeTests() {
  document.getElementById('tests-screen').classList.remove('active');
  // При возврате к экрану глав — перерисовать с актуальными счётчиками.
  if (state.currentBookId) renderChapters();
}

// ───── init ─────
loadBooks();

// Periodic refresh: каждые 30 сек обновляем список (на случай если бот добавил книгу голосом пока юзер сидит в MEMORY)
setInterval(() => {
  if (state.currentBookId === null && state.currentChapterId === null
      && !document.getElementById('add-modal').classList.contains('active')) {
    loadBooks();
  }
}, 30000);
</script>
