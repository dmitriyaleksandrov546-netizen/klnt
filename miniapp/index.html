<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--tg-theme-bg-color,#1c1c1e);
  --bg2:var(--tg-theme-secondary-bg-color,#2c2c2e);
  --text:var(--tg-theme-text-color,#ffffff);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --link:var(--tg-theme-link-color,#0a84ff);
  --btn:var(--tg-theme-button-color,#0a84ff);
  --btn-text:var(--tg-theme-button-text-color,#ffffff);
  --nav-h:64px;
  --radius:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
.screen{flex:1;overflow-y:auto;padding:16px 16px calc(var(--nav-h) + 16px)}
.screen.hidden{display:none}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,0.08);z-index:100}
nav button{flex:1;background:none;border:none;color:var(--hint);font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:color .15s}
nav button.active{color:var(--btn)}
nav button svg{width:24px;height:24px;fill:currentColor}

/* CARDS */
.card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:16px;font-weight:600;margin-bottom:2px}
.card-author{font-size:13px;color:var(--hint);margin-bottom:12px}
.progress-wrap{margin-bottom:8px}
.progress-label{font-size:12px;color:var(--hint);margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s ease}
.fill-read{background:var(--btn)}
.fill-test{background:#30d158}
.card-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.card-link{font-size:13px;color:var(--link);text-decoration:none}
.btn-chapters{background:var(--btn);color:var(--btn-text);border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer}

/* CHAPTERS VIEW */
#chapters-view{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
#chapters-view.open{transform:translateX(0)}
.chapters-header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.back-btn{background:none;border:none;color:var(--link);font-size:15px;cursor:pointer;display:flex;align-items:center;gap:4px}
.chapters-title{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chapters-list{flex:1;overflow-y:auto;padding:12px 16px}
.chapter-item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:15px;color:var(--text)}
.chapter-item:last-child{border-bottom:none}

/* TESTS */
.empty-state{text-align:center;padding:60px 24px;color:var(--hint)}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state p{font-size:15px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen-books">
    <div id="books-list"></div>
  </div>
  <div class="screen hidden" id="screen-tests">
    <div class="empty-state">
      <div class="icon">📝</div>
      <p>Тесты скоро появятся.<br>Добавьте книгу и пройдите главы.</p>
    </div>
  </div>
  <nav>
    <button class="active" id="nav-books" onclick="showTab('books')">
      <svg viewBox="0 0 24 24"><path d="M18 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2zm-6 14H8v-2h4v2zm4-4H8v-2h8v2zm0-4H8V6h8v2z"/></svg>
      Книги
    </button>
    <button id="nav-tests" onclick="showTab('tests')">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
      Тесты
    </button>
  </nav>
</div>

<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" onclick="closeChapters()">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M9 1L1 8L9 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Назад
    </button>
    <span class="chapters-title" id="chapters-book-title"></span>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<script>
if(window.Telegram&&window.Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const books=[
  {id:1,title:"Атомные привычки",author:"Джеймс Клир",reading_progress:60,test_progress:30,url:"https://books.google.com",chapters:["Глава 1","Глава 2","Глава 3","Глава 4","Глава 5"]},
  {id:2,title:"Думай медленно... решай быстро",author:"Даниэль Канеман",reading_progress:20,test_progress:0,url:"https://books.google.com",chapters:["Глава 1","Глава 2","Глава 3"]}
];

function renderBooks(){
  const list=document.getElementById('books-list');
  list.innerHTML=books.map(b=>`
    <div class="card">
      <div class="card-title">${b.title}</div>
      <div class="card-author">${b.author}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Чтение</span><span>${b.reading_progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill fill-read" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill fill-test" style="width:${b.test_progress}%"></div></div>
      </div>
      <div class="card-actions">
        <a class="card-link" href="${b.url}" target="_blank">🔗 Google Books</a>
        <button class="btn-chapters" onclick="openChapters(${b.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

function showTab(tab){
  document.getElementById('screen-books').classList.toggle('hidden',tab!=='books');
  document.getElementById('screen-tests').classList.toggle('hidden',tab!=='tests');
  document.getElementById('nav-books').classList.toggle('active',tab==='books');
  document.getElementById('nav-tests').classList.toggle('active',tab==='tests');
}

function openChapters(id){
  const book=books.find(b=>b.id===id);
  if(!book)return;
  document.getElementById('chapters-book-title').textContent=book.title;
  document.getElementById('chapters-list').innerHTML=book.chapters.map((ch,i)=>`
    <div class="chapter-item">${i+1}. ${ch}</div>
  `).join('');
  document.getElementById('chapters-view').classList.add('open');
  if(window.Telegram&&window.Telegram.WebApp)Telegram.WebApp.BackButton.show();
}

function closeChapters(){
  document.getElementById('chapters-view').classList.remove('open');
  if(window.Telegram&&window.Telegram.WebApp)Telegram.WebApp.BackButton.hide();
}

if(window.Telegram&&window.Telegram.WebApp){
  Telegram.WebApp.BackButton.onClick(closeChapters);
}

renderBooks();
</script>
</body>
</html>
