<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: var(--tg-theme-bg-color, #1c1c1e);
  --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #8e8e93);
  --link: var(--tg-theme-link-color, #0a84ff);
  --btn: var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --nav-h: 60px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  overflow: hidden;
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.screen {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px calc(var(--nav-h) + 16px);
}

/* ── Bottom nav ── */
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  z-index: 100;
}

nav button {
  flex: 1;
  background: none;
  border: none;
  color: var(--hint);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: color .2s;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

nav button.active { color: var(--btn); }

nav button svg { width: 24px; height: 24px; }

/* ── Book card ── */
.book-card {
  background: var(--bg2);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}

.book-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}

.book-author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 14px;
}

/* Progress bars */
.progress-group { margin-bottom: 14px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--hint);
  margin-bottom: 5px;
}

.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 99px;
  transition: width .4s ease;
}

.progress-fill.reading { background: var(--btn); }
.progress-fill.tests   { background: #30d158; }

/* Card footer */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.book-link {
  font-size: 13px;
  color: var(--link);
  text-decoration: none;
}

.btn-chapters {
  background: var(--btn);
  color: var(--btn-text);
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}

.btn-chapters:active { opacity: .7; }

/* ── Chapters view ── */
#chapters-view {
  display: none;
}

#chapters-view.visible {
  display: block;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--btn);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 16px;
  padding: 0;
}

.chapters-book-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}

.chapter-item {
  background: var(--bg2);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  font-size: 15px;
  color: var(--text);
}

/* ── Tests tab ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100vh - var(--nav-h) - 80px);
  gap: 12px;
  color: var(--hint);
  text-align: center;
}

.empty-state svg {
  width: 56px;
  height: 56px;
  opacity: .4;
}

.empty-state h2 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

.empty-state p {
  font-size: 14px;
  max-width: 240px;
  line-height: 1.5;
}

/* Utility */
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Tab: Books ── -->
  <div id="tab-books" class="screen">

    <!-- Book list -->
    <div id="books-list"></div>

    <!-- Chapters view (nested) -->
    <div id="chapters-view">
      <button class="back-btn" onclick="closeChapters()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Назад
      </button>
      <div class="chapters-book-title" id="chapters-title"></div>
      <div id="chapters-list"></div>
    </div>

  </div>

  <!-- ── Tab: Tests ── -->
  <div id="tab-tests" class="screen hidden">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/>
        <line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
      <h2>Тесты скоро</h2>
      <p>Добавьте книги и пройдите тесты по главам, чтобы закрепить знания</p>
    </div>
  </div>

  <!-- ── Bottom nav ── -->
  <nav>
    <button id="nav-books" class="active" onclick="showTab('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      Книги
    </button>
    <button id="nav-tests" onclick="showTab('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
      Тесты
    </button>
  </nav>

</div>

<script>
// Init Telegram Web App
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Mock data ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила атомных привычек", "Глава 2. Как привычки формируют вашу идентичность", "Глава 3. Как построить лучшие привычки за 4 шага", "Глава 4. Человек, который не смотрит на то, что делает", "Глава 5. Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=ZuKTvERuPG8C",
    chapters: ["Глава 1. Действующие лица", "Глава 2. Внимание и усилия", "Глава 3. Ленивый контролёр"]
  }
];

// ── Tab switching ──
function showTab(name) {
  document.getElementById('tab-books').classList.toggle('hidden', name !== 'books');
  document.getElementById('tab-tests').classList.toggle('hidden', name !== 'tests');
  document.getElementById('nav-books').classList.toggle('active', name === 'books');
  document.getElementById('nav-tests').classList.toggle('active', name === 'tests');
  // Hide chapters when switching tabs
  if (name !== 'books') closeChapters();
}

// ── Render book list ──
function renderBooks() {
  const container = document.getElementById('books-list');
  container.innerHTML = books.map(book => `
    <div class="book-card">
      <div class="book-title">${escHtml(book.title)}</div>
      <div class="book-author">${escHtml(book.author)}</div>

      <div class="progress-group">
        <div class="progress-label">
          <span>Прочитано</span>
          <span>${book.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill reading" style="width:${book.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-group">
        <div class="progress-label">
          <span>Тесты</span>
          <span>${book.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${book.test_progress}%"></div>
        </div>
      </div>

      <div class="card-footer">
        <a class="book-link" href="${escHtml(book.url)}" target="_blank">Открыть книгу ↗</a>
        <button class="btn-chapters" onclick="openChapters(${book.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

// ── Chapters ──
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('books-list').classList.add('hidden');
  const view = document.getElementById('chapters-view');
  view.classList.add('visible');

  document.getElementById('chapters-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">${i + 1}. ${escHtml(ch)}</div>
  `).join('');

  // Telegram back button
  if (tg?.BackButton) {
    tg.BackButton.show();
    tg.BackButton.onClick(closeChapters);
  }
}

function closeChapters() {
  document.getElementById('books-list').classList.remove('hidden');
  document.getElementById('chapters-view').classList.remove('visible');
  if (tg?.BackButton) tg.BackButton.hide();
}

// ── Helpers ──
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
renderBooks();
</script>
</body>
</html>
