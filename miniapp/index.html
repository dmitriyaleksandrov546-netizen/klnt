<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: var(--tg-theme-bg-color, #1c1c1e);
  --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #8e8e93);
  --link: var(--tg-theme-link-color, #0a84ff);
  --btn: var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --radius: 16px;
  --nav-h: 64px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
}

/* ── Tabs ── */
.tabs {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100;
}

.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--hint);
  font-size: 11px;
  cursor: pointer;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.tab-btn svg { width: 24px; height: 24px; }

.tab-btn.active {
  color: var(--btn);
}

/* ── Screens ── */
.screen {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px calc(var(--nav-h) + 16px);
}

.screen.active { display: block; }

/* ── Page title ── */
.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  padding-top: 4px;
}

/* ── Book card ── */
.book-card {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.book-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 2px;
}

.book-author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 12px;
}

/* ── Progress ── */
.progress-group { margin-bottom: 12px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--hint);
  margin-bottom: 5px;
}

.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-fill.reading { background: var(--btn); }
.progress-fill.tests   { background: #30d158; }

/* ── Book footer ── */
.book-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.book-link {
  font-size: 13px;
  color: var(--link);
  text-decoration: none;
}
.book-link:active { opacity: 0.7; }

.chapters-btn {
  background: var(--btn);
  color: var(--btn-text);
  border: none;
  border-radius: 10px;
  padding: 7px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
}
.chapters-btn:active { opacity: 0.8; }

/* ── Chapters view ── */
.chapters-view {
  display: none;
}
.chapters-view.active { display: block; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--btn);
  font-size: 16px;
  cursor: pointer;
  padding: 0;
  margin-bottom: 16px;
  -webkit-tap-highlight-color: transparent;
}

.chapters-book-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.chapters-book-author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 16px;
}

.chapter-item {
  background: var(--bg2);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  font-size: 15px;
}

/* ── Tests screen ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 12px;
  color: var(--hint);
  text-align: center;
}

.empty-state .emoji { font-size: 48px; }
.empty-state .title { font-size: 18px; font-weight: 600; color: var(--text); }
.empty-state .subtitle { font-size: 14px; max-width: 240px; }

/* ── Books list view ── */
.books-list { display: block; }
</style>
</head>
<body>

<!-- Screen: Books -->
<div class="screen active" id="screen-books">

  <!-- Books list -->
  <div class="books-list" id="books-list">
    <div class="page-title">📚 Мои книги</div>
    <div id="cards-container"></div>
  </div>

  <!-- Chapters detail -->
  <div class="chapters-view" id="chapters-view">
    <button class="back-btn" onclick="closeChapters()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
      Назад
    </button>
    <div class="chapters-book-title" id="ch-title"></div>
    <div class="chapters-book-author" id="ch-author"></div>
    <div id="ch-list"></div>
  </div>

</div>

<!-- Screen: Tests -->
<div class="screen" id="screen-tests">
  <div class="empty-state">
    <div class="emoji">🧪</div>
    <div class="title">Тесты</div>
    <div class="subtitle">Тесты появятся после добавления книг и глав</div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="tabs">
  <button class="tab-btn active" id="tab-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="tab-btn" id="tab-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
// Telegram Web App init
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// Mock data
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1: Сила атомных привычек", "Глава 2: Как работают привычки", "Глава 3: Четыре закона изменения поведения", "Глава 4: Сделай это очевидным", "Глава 5: Сделай это привлекательным"]
  },
  {
    id: 2,
    title: "Думай медленно, решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=thinking-fast-slow",
    chapters: ["Глава 1: Два вида мышления", "Глава 2: Внимание и усилие", "Глава 3: Ленивый контролёр"]
  }
];

// Render book cards
function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = books.map(book => `
    <div class="book-card">
      <div class="book-title">${book.title}</div>
      <div class="book-author">${book.author}</div>

      <div class="progress-group">
        <div class="progress-label">
          <span>Прогресс чтения</span>
          <span>${book.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill reading" style="width:${book.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-group">
        <div class="progress-label">
          <span>Прогресс тестов</span>
          <span>${book.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${book.test_progress}%"></div>
        </div>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${book.url}" target="_blank">🔗 Открыть книгу</a>
        <button class="chapters-btn" onclick="openChapters(${book.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

// Open chapters view
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('ch-title').textContent = book.title;
  document.getElementById('ch-author').textContent = book.author;
  document.getElementById('ch-list').innerHTML = book.chapters
    .map((ch, i) => `<div class="chapter-item">${ch}</div>`)
    .join('');

  document.getElementById('books-list').style.display = 'none';
  document.getElementById('chapters-view').classList.add('active');

  if (tg?.BackButton) {
    tg.BackButton.show();
    tg.BackButton.onClick(closeChapters);
  }
}

// Close chapters view
function closeChapters() {
  document.getElementById('books-list').style.display = 'block';
  document.getElementById('chapters-view').classList.remove('active');
  if (tg?.BackButton) tg.BackButton.hide();
}

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// Init
renderCards();
</script>
</body>
</html>
