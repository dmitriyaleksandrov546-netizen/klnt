<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       var(--tg-theme-bg-color, #1c1c1e);
  --bg2:      var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text:     var(--tg-theme-text-color, #ffffff);
  --hint:     var(--tg-theme-hint-color, #8e8e93);
  --link:     var(--tg-theme-link-color, #0a84ff);
  --btn:      var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --radius:   16px;
  --nav-h:    60px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; }

.screen { display: none; flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
.screen.active { display: block; }

/* ── Bottom nav ── */
nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  display: flex;
  border-top: 1px solid rgba(255,255,255,.08);
}
nav button {
  flex: 1; border: none; background: none;
  color: var(--hint);
  font-size: 11px; font-weight: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; transition: color .2s;
}
nav button.active { color: var(--btn); }
nav button svg { width: 22px; height: 22px; fill: currentColor; }

/* ── Cards ── */
.card {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.card-author { font-size: 13px; color: var(--hint); margin-bottom: 12px; }

/* ── Progress bars ── */
.progress-group { margin-bottom: 10px; }
.progress-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--hint); margin-bottom: 4px;
}
.progress-track {
  height: 6px; background: rgba(255,255,255,.12);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  transition: width .4s ease;
}
.progress-fill.read  { background: var(--btn); }
.progress-fill.tests { background: #30d158; }

/* ── Card footer ── */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px;
}
.card-link { font-size: 13px; color: var(--link); text-decoration: none; }
.card-link:hover { text-decoration: underline; }
.btn-chapters {
  background: var(--btn); color: var(--btn-text);
  border: none; border-radius: 10px;
  padding: 7px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer;
}

/* ── Chapters view ── */
#chapters-view {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 100;
  flex-direction: column;
}
#chapters-view.open { display: flex; }

.chapters-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  background: var(--bg2);
}
.back-btn {
  background: none; border: none; color: var(--link);
  font-size: 15px; cursor: pointer; padding: 0;
  display: flex; align-items: center; gap: 4px;
}
.back-btn svg { width: 18px; height: 18px; fill: currentColor; }
.chapters-book-title { font-size: 16px; font-weight: 600; }

.chapters-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.chapter-item {
  background: var(--bg2);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  font-size: 15px;
}

/* ── Tests placeholder ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 60vh; gap: 12px; color: var(--hint);
}
.empty-state svg { width: 56px; height: 56px; opacity: .4; fill: var(--hint); }
.empty-state p { font-size: 16px; font-weight: 500; }
.empty-state span { font-size: 13px; }

/* ── Page title ── */
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
</style>
</head>
<body>

<div id="app">

  <!-- Книги -->
  <div id="screen-books" class="screen active">
    <div class="page-title">Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- Тесты -->
  <div id="screen-tests" class="screen">
    <div class="page-title">Тесты</div>
    <div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      <p>Тесты скоро</p>
      <span>Добавьте книги и пройдите тесты по главам</span>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav>
    <button id="nav-books" class="active" onclick="switchTab('books')">
      <svg viewBox="0 0 24 24"><path d="M6 2a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6H6zm7 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h5v1.5H8V16zm0-6h3v1.5H8V10z"/></svg>
      Книги
    </button>
    <button id="nav-tests" onclick="switchTab('tests')">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h.01M12 12h.01M15 12h.01M9 16h.01M12 16h.01M15 16h.01"/></svg>
      Тесты
    </button>
  </nav>

</div>

<!-- Chapters overlay -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" onclick="closeChapters()">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      Назад
    </button>
    <span class="chapters-book-title" id="chapters-title"></span>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<script>
// ── Init Telegram WebApp ──
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Mock data ──
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1: Удивительная сила атомных привычек", "Глава 2: Почему ваш мозг строит привычки", "Глава 3: Как выработать хорошую привычку за 4 шага", "Глава 4: Человек, который не верил в систему", "Глава 5: Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно, решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=thinking-fast-and-slow",
    chapters: ["Глава 1: Персонажи истории", "Глава 2: Внимание и усилие", "Глава 3: Ленивый контролёр"]
  }
];

// ── Render books ──
function renderBooks() {
  const list = document.getElementById('books-list');
  list.innerHTML = books.map(b => `
    <div class="card">
      <div class="card-title">${b.title}</div>
      <div class="card-author">${b.author}</div>

      <div class="progress-group">
        <div class="progress-label">
          <span>📖 Прочитано</span>
          <span>${b.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill read" style="width:${b.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-group">
        <div class="progress-label">
          <span>✅ Тесты</span>
          <span>${b.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${b.test_progress}%"></div>
        </div>
      </div>

      <div class="card-footer">
        <a class="card-link" href="${b.url}" target="_blank">🔗 Google Books</a>
        <button class="btn-chapters" onclick="openChapters(${b.id})">Главы →</button>
      </div>
    </div>
  `).join('');
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
}

// ── Chapters overlay ──
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  document.getElementById('chapters-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML = book.chapters
    .map((ch, i) => `<div class="chapter-item">${ch}</div>`)
    .join('');
  document.getElementById('chapters-view').classList.add('open');
  if (tg) tg.BackButton.show();
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('open');
  if (tg) tg.BackButton.hide();
}

// Telegram back button
if (tg) tg.BackButton.onClick(closeChapters);

// ── Boot ──
renderBooks();
</script>
</body>
</html>
