<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--tg-theme-bg-color,#1c1c1e);
  --bg2:var(--tg-theme-secondary-bg-color,#2c2c2e);
  --text:var(--tg-theme-text-color,#ffffff);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --link:var(--tg-theme-link-color,#0a84ff);
  --btn:var(--tg-theme-button-color,#0a84ff);
  --btn-text:var(--tg-theme-button-text-color,#ffffff);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
body{display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;padding:16px 16px calc(var(--nav-h) + 16px)}
.screen.hidden{display:none}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.08);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--hint);font-size:11px;cursor:pointer;transition:color .15s}
.nav-btn.active{color:var(--btn)}
.nav-btn svg{width:24px;height:24px}

/* CARDS */
.card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:16px;font-weight:600;margin-bottom:2px}
.card-author{font-size:13px;color:var(--hint);margin-bottom:12px}
.progress-wrap{margin-bottom:8px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--hint);margin-bottom:4px}
.progress-track{height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s}
.fill-read{background:var(--btn)}
.fill-test{background:#30d158}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.card-link{font-size:13px;color:var(--link);text-decoration:none}
.chapters-btn{background:var(--btn);color:var(--btn-text);border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}

/* CHAPTERS VIEW */
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--btn);font-size:15px;cursor:pointer;margin-bottom:16px;padding:0}
.back-btn svg{width:20px;height:20px}
.screen-title{font-size:20px;font-weight:700;margin-bottom:4px}
.screen-sub{font-size:13px;color:var(--hint);margin-bottom:16px}
.chapter-item{background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:8px;font-size:15px}
.chapter-num{color:var(--hint);font-size:13px;margin-bottom:2px}

/* TESTS */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;color:var(--hint)}
.empty-state svg{width:56px;height:56px;margin-bottom:16px;opacity:.4}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px}
</style>
</head>
<body>

<!-- Книги -->
<div id="screen-books" class="screen">
  <div id="books-list"></div>
</div>

<!-- Главы -->
<div id="screen-chapters" class="screen hidden">
  <button class="back-btn" onclick="showBooks()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Назад
  </button>
  <div class="screen-title" id="ch-title"></div>
  <div class="screen-sub" id="ch-author"></div>
  <div id="ch-list"></div>
</div>

<!-- Тесты -->
<div id="screen-tests" class="screen hidden">
  <div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
      <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
    </svg>
    <h3>Тесты скоро</h3>
    <p>Функция тестирования<br>появится в следующем обновлении</p>
  </div>
</div>

<!-- NAV -->
<nav>
  <button class="nav-btn active" id="nav-books" onclick="switchTab('books')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
    </svg>
    Книги
  </button>
  <button class="nav-btn" id="nav-tests" onclick="switchTab('tests')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
      <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
    </svg>
    Тесты
  </button>
</nav>

<script>
if(window.Telegram&&window.Telegram.WebApp){
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

const books=[
  {id:1,title:"Атомные привычки",author:"Джеймс Клир",reading_progress:60,test_progress:30,url:"https://books.google.com",chapters:["Глава 1","Глава 2","Глава 3","Глава 4","Глава 5"]},
  {id:2,title:"Думай медленно... решай быстро",author:"Даниэль Канеман",reading_progress:20,test_progress:0,url:"https://books.google.com",chapters:["Глава 1","Глава 2","Глава 3"]}
];

let currentTab='books';

function switchTab(tab){
  currentTab=tab;
  ['books','tests'].forEach(t=>{
    document.getElementById('screen-'+t).classList.toggle('hidden',t!==tab);
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('screen-chapters').classList.add('hidden');
}

function showBooks(){
  document.getElementById('screen-books').classList.remove('hidden');
  document.getElementById('screen-chapters').classList.add('hidden');
}

function showChapters(id){
  const book=books.find(b=>b.id===id);
  if(!book)return;
  document.getElementById('ch-title').textContent=book.title;
  document.getElementById('ch-author').textContent=book.author;
  const list=document.getElementById('ch-list');
  list.innerHTML=book.chapters.map((ch,i)=>`
    <div class="chapter-item">
      <div class="chapter-num">Глава ${i+1}</div>
      <div>${ch}</div>
    </div>
  `).join('');
  document.getElementById('screen-books').classList.add('hidden');
  document.getElementById('screen-chapters').classList.remove('hidden');
}

function renderBooks(){
  document.getElementById('books-list').innerHTML=books.map(b=>`
    <div class="card">
      <div class="card-title">${b.title}</div>
      <div class="card-author">${b.author}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>📖 Чтение</span><span>${b.reading_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill fill-read" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>✅ Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill fill-test" style="width:${b.test_progress}%"></div></div>
      </div>
      <div class="card-footer">
        <a class="card-link" href="${b.url}" target="_blank">Открыть книгу ↗</a>
        <button class="chapters-btn" onclick="showChapters(${b.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

renderBooks();
</script>
</body>
</html>
