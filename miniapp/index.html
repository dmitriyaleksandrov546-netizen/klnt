<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--tg-theme-bg-color,#1c1c1e);
  --bg2:var(--tg-theme-secondary-bg-color,#2c2c2e);
  --text:var(--tg-theme-text-color,#ffffff);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --link:var(--tg-theme-link-color,#0a84ff);
  --btn:var(--tg-theme-button-color,#0a84ff);
  --btn-text:var(--tg-theme-button-text-color,#ffffff);
  --radius:14px;
  --nav-h:60px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
.screen{flex:1;overflow-y:auto;padding:16px 16px calc(var(--nav-h) + 16px);display:none}
.screen.active{display:block}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,0.08);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--hint);font-size:11px;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--btn)}
.nav-btn svg{width:24px;height:24px;fill:currentColor}

/* BOOK CARD */
.book-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.book-title{font-size:16px;font-weight:600;margin-bottom:4px}
.book-author{font-size:13px;color:var(--hint);margin-bottom:12px}
.progress-group{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--hint);margin-bottom:5px}
.progress-track{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease}
.progress-fill.read{background:var(--btn)}
.progress-fill.test{background:#30d158}
.book-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.book-link{font-size:13px;color:var(--link);text-decoration:none}
.chapters-btn{background:var(--btn);color:var(--btn-text);border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;font-weight:500}

/* CHAPTERS VIEW */
#chapters-view{position:fixed;inset:0;background:var(--bg);z-index:200;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
#chapters-view.open{transform:translateX(0)}
.chapters-header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.back-btn{background:none;border:none;color:var(--btn);font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0}
.chapters-title{font-size:17px;font-weight:600}
.chapters-list{flex:1;overflow-y:auto;padding:12px 16px}
.chapter-item{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:15px;color:var(--text)}
.chapter-item:last-child{border-bottom:none}

/* TESTS */
.tests-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--hint);text-align:center}
.tests-empty svg{width:56px;height:56px;opacity:.4}
.tests-empty p{font-size:15px}

/* HEADER */
.screen-header{font-size:20px;font-weight:700;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
  <!-- Книги -->
  <div id="screen-books" class="screen active">
    <div class="screen-header">📚 Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- Тесты -->
  <div id="screen-tests" class="screen">
    <div class="tests-empty">
      <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      <p>Тесты появятся после<br>прохождения глав</p>
    </div>
  </div>

  <!-- Нижняя навигация -->
  <nav>
    <button class="nav-btn active" data-screen="books">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Книги
    </button>
    <button class="nav-btn" data-screen="tests">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Тесты
    </button>
  </nav>
</div>

<!-- Список глав (оверлей) -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" id="back-btn">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1.5L1.5 8l7 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Назад
    </button>
    <span class="chapters-title" id="chapters-title">Главы</span>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<script>
// Telegram WebApp init
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

// Mock данные
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила крошечных привычек","Глава 2. Как привычки формируют личность","Глава 3. Как создать лучшие привычки за 4 шага","Глава 4. Человек, не замечающий своих привычек","Глава 5. Лучший способ изменить себя"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=thinking-fast-and-slow",
    chapters: ["Глава 1. Действующие лица истории","Глава 2. Внимание и усилие","Глава 3. Ленивый контролёр"]
  }
];

// Рендер книг
function renderBooks() {
  const list = document.getElementById('books-list');
  list.innerHTML = books.map(b => `
    <div class="book-card">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <div class="progress-group">
        <div class="progress-label"><span>Чтение</span><span>${b.reading_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill read" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-group">
        <div class="progress-label"><span>Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-track"><div class="progress-fill test" style="width:${b.test_progress}%"></div></div>
      </div>
      <div class="book-footer">
        <a class="book-link" href="${b.url}" target="_blank">🔗 Открыть книгу</a>
        <button class="chapters-btn" onclick="openChapters(${b.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

// Открыть главы
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  document.getElementById('chapters-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML =
    book.chapters.map((ch, i) => `<div class="chapter-item">${ch}</div>`).join('');
  document.getElementById('chapters-view').classList.add('open');
  if (tg) tg.BackButton.show();
}

// Закрыть главы
function closeChapters() {
  document.getElementById('chapters-view').classList.remove('open');
  if (tg) tg.BackButton.hide();
}

document.getElementById('back-btn').addEventListener('click', closeChapters);
if (tg) tg.BackButton.onClick(closeChapters);

// Навигация
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const screen = btn.dataset.screen;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('screen-' + screen).classList.add('active');
  });
});

renderBooks();
</script>
</body>
</html>
