<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: var(--tg-theme-bg-color, #1c1c1e);
  --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #8e8e93);
  --link: var(--tg-theme-link-color, #0a84ff);
  --btn: var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --radius: 14px;
  --nav-h: 60px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* SCREENS */
.screen {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px calc(var(--nav-h) + 12px);
}
.screen.active { display: block; }

/* NAV */
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--hint);
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--btn); }
.nav-btn svg { width: 24px; height: 24px; fill: currentColor; }

/* BOOK CARD */
.book-card {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
}
.book-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 3px;
  color: var(--text);
}
.book-author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 12px;
}

/* PROGRESS */
.progress-row {
  margin-bottom: 8px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--hint);
  margin-bottom: 5px;
}
.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-fill.read { background: var(--btn); }
.progress-fill.test { background: #30d158; }

/* BOOK FOOTER */
.book-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}
.book-link {
  font-size: 13px;
  color: var(--link);
  text-decoration: none;
}
.book-link:active { opacity: 0.7; }
.btn-chapters {
  background: var(--btn);
  color: var(--btn-text);
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-chapters:active { opacity: 0.75; }

/* CHAPTERS VIEW */
#chapters-screen {
  display: none;
}
#chapters-screen.active {
  display: block;
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--link);
  font-size: 15px;
  cursor: pointer;
  padding: 0;
  margin-bottom: 16px;
}
.back-btn svg { width: 20px; height: 20px; fill: currentColor; }
.chapters-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text);
}
.chapter-item {
  background: var(--bg2);
  border-radius: 10px;
  padding: 13px 16px;
  margin-bottom: 8px;
  font-size: 15px;
  color: var(--text);
}

/* TESTS */
.tests-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  color: var(--hint);
  text-align: center;
  gap: 12px;
}
.tests-empty svg { width: 48px; height: 48px; fill: var(--hint); opacity: 0.4; }
.tests-empty p { font-size: 16px; }
.tests-empty span { font-size: 13px; opacity: 0.6; }

/* PAGE TITLE */
.page-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}
</style>
</head>
<body>
<div class="app">

  <!-- BOOKS SCREEN -->
  <div id="books-screen" class="screen active">
    <div class="page-title">Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- CHAPTERS SCREEN -->
  <div id="chapters-screen" class="screen">
    <button class="back-btn" onclick="showBooks()">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      Назад
    </button>
    <div class="chapters-title" id="chapters-book-title"></div>
    <div id="chapters-list"></div>
  </div>

  <!-- TESTS SCREEN -->
  <div id="tests-screen" class="screen">
    <div class="page-title">Тесты</div>
    <div class="tests-empty">
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
      <p>Тесты скоро</p>
      <span>Здесь появятся вопросы по вашим книгам</span>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <button class="nav-btn active" id="nav-books" onclick="switchTab('books')">
      <svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
      Книги
    </button>
    <button class="nav-btn" id="nav-tests" onclick="switchTab('tests')">
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
      Тесты
    </button>
  </nav>

</div>

<script>
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com",
    chapters: ["Глава 1: Удивительная сила атомных привычек", "Глава 2: Почему привычки формируют идентичность", "Глава 3: Как выстроить лучшие привычки", "Глава 4: Человек, который не смотрит на голову", "Глава 5: Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com",
    chapters: ["Глава 1: Персонажи истории", "Глава 2: Внимание и усилие", "Глава 3: Ленивый контролёр"]
  }
];

// Telegram Web App init
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

let currentTab = 'books';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'books') {
    document.getElementById('books-screen').classList.add('active');
    document.getElementById('nav-books').classList.add('active');
  } else if (tab === 'tests') {
    document.getElementById('tests-screen').classList.add('active');
    document.getElementById('nav-tests').classList.add('active');
  }
}

function showChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-book-title').textContent = book.title;

  const list = document.getElementById('chapters-list');
  list.innerHTML = book.chapters.map(ch =>
    `<div class="chapter-item">${ch}</div>`
  ).join('');

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('chapters-screen').classList.add('active');
  document.getElementById('nav-books').classList.add('active');
}

function showBooks() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('books-screen').classList.add('active');
  document.getElementById('nav-books').classList.add('active');
}

function renderBooks() {
  const container = document.getElementById('books-list');
  container.innerHTML = books.map(book => `
    <div class="book-card">
      <div class="book-title">${book.title}</div>
      <div class="book-author">${book.author}</div>

      <div class="progress-row">
        <div class="progress-label">
          <span>Прочитано</span>
          <span>${book.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill read" style="width:${book.reading_progress}%"></div>
        </div>
      </div>

      <div class="progress-row">
        <div class="progress-label">
          <span>Тесты</span>
          <span>${book.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill test" style="width:${book.test_progress}%"></div>
        </div>
      </div>

      <div class="book-footer">
        <a class="book-link" href="${book.url}" target="_blank">📖 Google Books</a>
        <button class="btn-chapters" onclick="showChapters(${book.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

renderBooks();
</script>
</body>
</html>
