<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--tg-theme-bg-color,#1c1c1e);
  --bg2:var(--tg-theme-secondary-bg-color,#2c2c2e);
  --text:var(--tg-theme-text-color,#fff);
  --hint:var(--tg-theme-hint-color,#8e8e93);
  --link:var(--tg-theme-link-color,#0a84ff);
  --btn:var(--tg-theme-button-color,#0a84ff);
  --btn-text:var(--tg-theme-button-text-color,#fff);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding:16px;display:none}
.screen.active{display:block}
nav{height:var(--nav-h);background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.1)}
nav button{flex:1;background:none;border:none;color:var(--hint);font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
nav button.active{color:var(--btn)}
.card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:12px}
.card h3{font-size:16px;margin-bottom:4px}
.card .author{font-size:13px;color:var(--hint);margin-bottom:12px}
.progress-wrap{margin-bottom:8px}
.progress-label{font-size:12px;color:var(--hint);margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--btn)}
.progress-fill.green{background:#30d158}
.card-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.card-actions a{font-size:13px;color:var(--link)}
.card-actions button{background:var(--btn);color:var(--btn-text);border:none;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer}
.chapters-view{display:none}
.chapters-view.active{display:block}
.back-btn{background:none;border:none;color:var(--link);font-size:15px;cursor:pointer;margin-bottom:16px;padding:0}
.chapters-list{list-style:none}
.chapters-list li{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:15px}
.empty{text-align:center;color:var(--hint);margin-top:60px;font-size:15px}
</style>
</head>
<body>
<div id="app">
  <div id="screen-books" class="screen active">
    <div class="books-list" id="books-list"></div>
    <div class="chapters-view" id="chapters-view">
      <button class="back-btn" onclick="showBooks()">← Назад</button>
      <h2 id="chapters-title" style="margin-bottom:16px;font-size:18px"></h2>
      <ul class="chapters-list" id="chapters-list"></ul>
    </div>
  </div>
  <div id="screen-tests" class="screen">
    <p class="empty">Тесты скоро появятся 📝</p>
  </div>
  <nav>
    <button class="active" onclick="switchTab('books')" id="tab-books">
      <span style="font-size:20px">📚</span>Книги
    </button>
    <button onclick="switchTab('tests')" id="tab-tests">
      <span style="font-size:20px">✅</span>Тесты
    </button>
  </nav>
</div>
<script>
const tg = window.Telegram?.WebApp;
if(tg) tg.ready();

const books = [
  {id:1,title:"Атомные привычки",author:"Джеймс Клир",reading_progress:60,test_progress:30,url:"https://books.google.com",chapters:["Глава 1","Глава 2","Глава 3","Глава 4","Глава 5"]},
  {id:2,title:"Думай медленно… решай быстро",author:"Даниэль Канеман",reading_progress:20,test_progress:0,url:"https://books.google.com",chapters:["Глава 1","Глава 2","Глава 3"]}
];

function renderBooks(){
  const el=document.getElementById('books-list');
  el.innerHTML=books.map(b=>`
    <div class="card">
      <h3>${b.title}</h3>
      <div class="author">${b.author}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Чтение</span><span>${b.reading_progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${b.reading_progress}%"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Тесты</span><span>${b.test_progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill green" style="width:${b.test_progress}%"></div></div>
      </div>
      <div class="card-actions">
        <a href="${b.url}" target="_blank">Открыть книгу</a>
        <button onclick="showChapters(${b.id})">Главы</button>
      </div>
    </div>`).join('');
}

function showChapters(id){
  const b=books.find(x=>x.id===id);
  document.getElementById('books-list').style.display='none';
  const cv=document.getElementById('chapters-view');
  cv.classList.add('active');
  document.getElementById('chapters-title').textContent=b.title;
  document.getElementById('chapters-list').innerHTML=b.chapters.map(c=>`<li>${c}</li>`).join('');
}

function showBooks(){
  document.getElementById('books-list').style.display='';
  document.getElementById('chapters-view').classList.remove('active');
}

function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

renderBooks();
</script>
</body>
</html>
