<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: var(--tg-theme-bg-color, #1c1c1e);
  --bg2: var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #8e8e93);
  --link: var(--tg-theme-link-color, #0a84ff);
  --btn: var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --radius: 14px;
  --nav-h: 60px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; }

.screen { display: none; flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
.screen.active { display: block; }

/* BOTTOM NAV */
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg2);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100;
}

nav button {
  flex: 1;
  background: none;
  border: none;
  color: var(--hint);
  font-size: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: color .15s;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

nav button.active { color: var(--btn); }

nav button svg { width: 24px; height: 24px; }

/* BOOK CARD */
.book-card {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.book-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 3px;
  line-height: 1.3;
}

.book-card .author {
  font-size: 13px;
  color: var(--hint);
  margin-bottom: 14px;
}

/* PROGRESS */
.progress-group { margin-bottom: 14px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--hint);
  margin-bottom: 5px;
}

.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease;
}

.progress-fill.reading { background: var(--btn); }
.progress-fill.tests   { background: #30d158; }

/* CARD FOOTER */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.book-link {
  font-size: 13px;
  color: var(--link);
  text-decoration: none;
}
.book-link:hover { text-decoration: underline; }

.btn-chapters {
  background: var(--btn);
  color: var(--btn-text);
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-chapters:active { opacity: .75; }

/* CHAPTERS VIEW */
#chapters-view {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto;
  padding: 0 0 calc(var(--nav-h) + 16px);
}

#chapters-view.visible { display: block; }

.chapters-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
}

.btn-back {
  background: none;
  border: none;
  color: var(--btn);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0;
}

.chapters-title {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chapter-item {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.chapter-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(10,132,255,0.15);
  color: var(--btn);
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* TESTS SCREEN */
.tests-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  gap: 12px;
  color: var(--hint);
  text-align: center;
}

.tests-placeholder svg { width: 56px; height: 56px; opacity: .4; }
.tests-placeholder p { font-size: 16px; font-weight: 500; }
.tests-placeholder span { font-size: 13px; opacity: .7; }

/* PAGE TITLE */
.page-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<div id="app">
  <!-- BOOKS -->
  <div id="screen-books" class="screen active">
    <div class="page-title">Мои книги</div>
    <div id="books-list"></div>
  </div>

  <!-- TESTS -->
  <div id="screen-tests" class="screen">
    <div class="tests-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Тесты</p>
      <span>Скоро появятся вопросы по вашим книгам</span>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav>
    <button id="tab-books" class="active" onclick="showTab('books')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
      Книги
    </button>
    <button id="tab-tests" onclick="showTab('tests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Тесты
    </button>
  </nav>
</div>

<!-- CHAPTERS OVERLAY -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="btn-back" onclick="closeChapters()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Назад
    </button>
    <div class="chapters-title" id="chapters-book-title"></div>
  </div>
  <div id="chapters-list"></div>
</div>

<script>
// Telegram Web App init
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// Mock data
const books = [
  {
    id: 1,
    title: "Атомные привычки",
    author: "Джеймс Клир",
    reading_progress: 60,
    test_progress: 30,
    url: "https://books.google.com/books?id=XfFvDwAAQBAJ",
    chapters: ["Глава 1. Удивительная сила крошечных привычек", "Глава 2. Как привычки формируют вашу идентичность", "Глава 3. Как строить лучшие привычки за 4 шага", "Глава 4. Человек, которым вы хотите стать", "Глава 5. Лучший способ начать новую привычку"]
  },
  {
    id: 2,
    title: "Думай медленно… решай быстро",
    author: "Даниэль Канеман",
    reading_progress: 20,
    test_progress: 0,
    url: "https://books.google.com/books?id=TA7Q_ZMFbyUC",
    chapters: ["Глава 1. Персонажи истории", "Глава 2. Внимание и усилие", "Глава 3. Ленивый контролёр"]
  }
];

// Tab switching
function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// Render books
function renderBooks() {
  const list = document.getElementById('books-list');
  list.innerHTML = books.map(book => `
    <div class="book-card">
      <h3>${escHtml(book.title)}</h3>
      <div class="author">${escHtml(book.author)}</div>

      <div class="progress-group">
        <div class="progress-label">
          <span>📖 Прочитано</span>
          <span>${book.reading_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill reading" style="width:${book.reading_progress}%"></div>
        </div>

        <div class="progress-label">
          <span>✅ Тесты</span>
          <span>${book.test_progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill tests" style="width:${book.test_progress}%"></div>
        </div>
      </div>

      <div class="card-footer">
        <a class="book-link" href="${escHtml(book.url)}" target="_blank">🔗 Открыть книгу</a>
        <button class="btn-chapters" onclick="openChapters(${book.id})">Главы</button>
      </div>
    </div>
  `).join('');
}

// Chapters overlay
function openChapters(bookId) {
  const book = books.find(b => b.id === bookId);
  if (!book) return;

  document.getElementById('chapters-book-title').textContent = book.title;
  document.getElementById('chapters-list').innerHTML = book.chapters.map((ch, i) => `
    <div class="chapter-item">
      <div class="chapter-num">${i + 1}</div>
      <span>${escHtml(ch)}</span>
    </div>
  `).join('');

  document.getElementById('chapters-view').classList.add('visible');

  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.BackButton.show();
    Telegram.WebApp.BackButton.onClick(closeChapters);
  }
}

function closeChapters() {
  document.getElementById('chapters-view').classList.remove('visible');
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.BackButton.hide();
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Init
renderBooks();
</script>
</body>
</html>
